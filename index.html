<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Пого-Прыгун — игра с редактором уровней</title>
<style>
  :root{
    --ink:#233043; --paper:#fdf8ee; --accent:#ff7a45; --grass:#6bbf59;
    --sky1:#9fd9ef; --sky2:#e8f6dc; --btn:#ffffff; --btn-on:#233043;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;}
  canvas{display:block;position:fixed;inset:0;}
  #toolbar{
    position:fixed;top:10px;left:50%;transform:translateX(-50%);
    display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
    background:rgba(253,248,238,.92);border:3px solid var(--ink);
    border-radius:16px;padding:8px 10px;z-index:10;
    box-shadow:0 4px 0 rgba(35,48,67,.35);max-width:96vw;
  }
  .tb-btn{
    border:2.5px solid var(--ink);background:var(--btn);color:var(--ink);
    border-radius:10px;padding:6px 12px;font-weight:700;font-size:14px;cursor:pointer;
    box-shadow:0 2.5px 0 var(--ink);transition:transform .05s;
    user-select:none;
  }
  .tb-btn:active{transform:translateY(2px);box-shadow:0 .5px 0 var(--ink);}
  .tb-btn.on{background:var(--btn-on);color:#fff;}
  .tb-btn.play{background:var(--accent);color:#fff;}
  .sep{width:2px;background:var(--ink);opacity:.25;border-radius:2px;margin:2px 2px;}
  #msg{
    position:fixed;left:50%;top:42%;transform:translate(-50%,-50%);
    background:var(--paper);border:4px solid var(--ink);border-radius:20px;
    padding:22px 34px;text-align:center;z-index:20;
    box-shadow:0 6px 0 rgba(35,48,67,.35);display:none;
  }
  #msg h2{margin:0 0 6px;font-size:30px;color:var(--ink);}
  #msg p{margin:0 0 14px;color:#5a6676;font-size:15px;}
  #msg .tb-btn{font-size:16px;}
  #hint{
    position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
    background:rgba(35,48,67,.85);color:#fff;padding:6px 14px;border-radius:12px;
    font-size:13px;z-index:9;white-space:nowrap;max-width:96vw;overflow:hidden;text-overflow:ellipsis;
  }
  #touch{position:fixed;inset:auto 0 0 0;z-index:8;display:none;pointer-events:none;}
  #touch .tbn{
    pointer-events:auto;position:fixed;bottom:18px;width:70px;height:70px;border-radius:50%;
    border:3px solid var(--ink);background:rgba(253,248,238,.85);font-size:28px;
    display:flex;align-items:center;justify-content:center;user-select:none;color:var(--ink);font-weight:900;
  }
  #tL{left:18px} #tR{left:100px} #tJ{right:18px;width:86px;height:86px;background:rgba(255,122,69,.9);color:#fff;}
  @media (pointer:coarse){ #touch.playing{display:block;} }

  /* ---- экраны: меню и выбор уровня ---- */
  .screen{
    position:fixed;inset:0;z-index:30;display:none;
    flex-direction:column;align-items:center;justify-content:center;gap:14px;
    background:rgba(35,48,67,.45);backdrop-filter:blur(2px);padding:20px;
  }
  .panel{
    background:var(--paper);border:4px solid var(--ink);border-radius:24px;
    padding:26px 30px;text-align:center;box-shadow:0 8px 0 rgba(35,48,67,.35);
    max-width:min(640px,94vw);max-height:88vh;overflow:auto;
  }
  .panel h1{margin:0 0 4px;font-size:40px;color:var(--ink);letter-spacing:-1px;}
  .panel h2{margin:0 0 12px;font-size:26px;color:var(--ink);}
  .panel p{margin:0 0 18px;color:#5a6676;font-size:15px;}
  .tb-btn.big{font-size:19px;padding:12px 26px;border-radius:14px;margin:4px;}
  #levelGrid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:10px;margin-bottom:16px;
  }
  .lvl{
    border:3px solid var(--ink);background:#fff;border-radius:14px;padding:10px 8px;
    cursor:pointer;box-shadow:0 3px 0 var(--ink);text-align:left;transition:transform .05s;
  }
  .lvl:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink);}
  .lvl .num{font-size:12px;color:#8a97a8;font-weight:700;}
  .lvl .nm{font-size:15px;color:var(--ink);font-weight:700;line-height:1.2;}
  .lvl.done{background:#e8f7e2;}
  .lvl.done .nm::after{content:' ✓';color:var(--grass);}
  #worldGrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; margin-bottom:16px; }
  .world{
    border:3px solid var(--ink); border-radius:16px; padding:14px 12px; cursor:pointer;
    box-shadow:0 4px 0 var(--ink); text-align:left; transition:transform .05s; color:#fff;
  }
  .world:active{ transform:translateY(2px); box-shadow:0 2px 0 var(--ink); }
  .world .wname{ font-size:19px; font-weight:800; }
  .world .wprog{ font-size:13px; font-weight:700; opacity:.9; margin-top:4px; }
  .world .wbar{ height:7px; border-radius:4px; background:rgba(255,255,255,.35); margin-top:6px; overflow:hidden; }
  .world .wfill{ height:100%; background:#fff; border-radius:4px; }
  /* ---- HUD во время игры ---- */
  #hud{
    position:fixed;top:10px;left:50%;transform:translateX(-50%);
    display:none;gap:8px;align-items:center;z-index:10;
    background:rgba(253,248,238,.92);border:3px solid var(--ink);
    border-radius:16px;padding:6px 10px;box-shadow:0 4px 0 rgba(35,48,67,.35);
  }
  #hudName{font-weight:700;color:var(--ink);font-size:15px;padding:0 6px;}
  #hudScore{font-weight:900;color:var(--accent);font-size:17px;}
  #hudCombo{font-weight:700;color:#b06ce0;font-size:14px;min-width:34px;}
  #hudTime{color:#5a6676;font-size:13px;min-width:46px;}
  .lvl .best{font-size:12px;color:#c78a12;font-weight:700;}
  #codeArea{
    width:100%;height:130px;resize:vertical;font-family:ui-monospace,Menlo,Consolas,monospace;
    font-size:12px;border:3px solid var(--ink);border-radius:12px;padding:8px;margin-bottom:8px;
    background:#fff;color:var(--ink);word-break:break-all;
  }
  #codeMsg{min-height:20px;font-size:13px;font-weight:700;margin-bottom:8px;color:#5a6676;}
</style>
</head>
<body>
<div id="toolbar">
  <button class="tb-btn play" id="bTest">▶ Тест</button>
  <button class="tb-btn" id="bMenu">☰ Меню</button>
  <span class="sep"></span>
  <button class="tb-btn tool on" data-tool="block" id="tBlock">🧱 Блок</button>
  <button class="tb-btn tool" data-tool="erase">🧽 Стереть</button>
  <button class="tb-btn tool" data-tool="start">🟢 Старт</button>
  <button class="tb-btn tool" data-tool="flag">🏁 Флаг</button>
  <button class="tb-btn tool" data-tool="spike">🔺 Шипы</button>
  <button class="tb-btn tool" data-tool="tramp">🟣 Батут</button>
  <button class="tb-btn tool" data-tool="trampL">🟣↖</button>
  <button class="tb-btn tool" data-tool="trampR">🟣↗</button>
  <button class="tb-btn tool" data-tool="brk">🟤 Хрупкий</button>
  <button class="tb-btn tool" data-tool="moverh">↔ Платформа</button>
  <button class="tb-btn tool" data-tool="moverv">↕ Платформа</button>
  <button class="tb-btn tool" data-tool="moveredit">⚙ Настроить</button>
  <button class="tb-btn tool" data-tool="pan">✋ Рука</button>
  <span class="sep"></span>
  <button class="tb-btn" id="bMoon">🌙 Луна</button>
  <button class="tb-btn" id="bGoal">🎯 Цель</button>
  <span class="sep"></span>
  <button class="tb-btn" id="bExport">📤 Код</button>
  <button class="tb-btn" id="bImport">📥 Код</button>
  <button class="tb-btn" id="bSave">💾</button>
  <button class="tb-btn" id="bLoad">📂</button>
  <button class="tb-btn" id="bClear">🗑</button>
</div>

<div id="msg">
  <h2 id="msgTitle"></h2>
  <p id="msgText"></p>
  <div id="msgBtns"></div>
</div>

<div id="menu" class="screen">
  <div class="panel">
    <h1>Пого-Прыгун</h1>
    <p>Скачи на пого-стике до флага 🏁<br>Ударишься головой — свалишься тряпичной куклой.</p>
    <button class="tb-btn big play" id="mPlay">▶ Уровни</button>
    <button class="tb-btn big" id="mEdit">✏ Редактор</button>
    <button class="tb-btn big" id="mSound">🔊</button>
  </div>
</div>

<div id="worlds" class="screen">
  <div class="panel">
    <h2>Выбор мира</h2>
    <div id="worldGrid"></div>
    <button class="tb-btn" id="wCustom">🧩 Свой уровень</button>
    <button class="tb-btn" id="wBack">← Меню</button>
  </div>
</div>

<div id="select" class="screen">
  <div class="panel">
    <h2 id="selTitle">Уровни</h2>
    <div id="levelGrid"></div>
    <button class="tb-btn" id="sBack">← Миры</button>
  </div>
</div>

<div id="codeDlg" class="screen">
  <div class="panel">
    <h2>Код уровня</h2>
    <p>Зашифрованная строка с уровнем — ею можно поделиться.<br>Вставь чужой код и нажми «Импортировать».</p>
    <textarea id="codeArea" spellcheck="false" placeholder="PGJ1-..."></textarea>
    <div id="codeMsg"></div>
    <button class="tb-btn play" id="codeCopy">📋 Копировать</button>
    <button class="tb-btn" id="codeImport">📥 Импортировать</button>
    <button class="tb-btn" id="codeClose">Закрыть</button>
  </div>
</div>

<div id="hud">
  <span id="hudName"></span>
  <span id="hudScore">0</span>
  <span id="hudCombo"></span>
  <span id="hudTime">0.0s</span>
  <button class="tb-btn" id="hRetry">↻</button>
  <button class="tb-btn" id="hMenu">☰</button>
</div>

<div id="hint"></div>

<div id="touch">
  <div class="tbn" id="tL">◀</div>
  <div class="tbn" id="tR">▶</div>
  <div class="tbn" id="tJ">⤒</div>
</div>

<canvas id="cv"></canvas>

<script>
"use strict";
/* ============ базовые вещи ============ */
const T = 40;                       // размер клетки
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  cx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize); resize();

/* ============ уровень ============ */
// Элементы: blocks — обычные, tramp — батуты (пружинят), breakable — хрупкие (ломаются),
// spikes — шипы (не твёрдые, но убивают), movers — движущиеся платформы (посадка только сверху).
function emptyLevel(){
  return { blocks:new Set(), tramp:new Set(), breakable:new Set(), spikes:new Set(), movers:[],
           trampAngle:new Map(),      // клетка батута -> угол запуска в радианах (нет записи = вдоль наклона игрока)
           start:{cx:2, cy:11}, flag:{cx:30, cy:11},
           moon:false, goal:null, timeLimit:0 };   // moon — низкая гравитация; goal — {score,time}; timeLimit — сек до флага
}
let level = emptyLevel();
let broken = new Set();       // сломанные за эту попытку хрупкие блоки
let breakTimers = new Map();  // клетка -> кадров до разрушения
let moverT = 0;               // время для движущихся платформ (кадры)
let moverCache = [];          // текущие прямоугольники платформ

function key(cx_,cy_){ return cx_+','+cy_; }
function solidCell(cx_,cy_){
  const k = key(cx_,cy_);
  return level.blocks.has(k) || level.tramp.has(k) || (level.breakable.has(k) && !broken.has(k));
}
function solidAt(px,py){ return solidCell(Math.floor(px/T), Math.floor(py/T)); }
function spikeAt(px,py){ return level.spikes.has(key(Math.floor(px/T), Math.floor(py/T))); }

/* --- движущиеся платформы: позиция — чистая функция времени --- */
function moverRect(m, t){
  const span = m.range*T;
  const period = Math.max(2, 2*span/m.speed);
  const u = ((t/period + (m.phase||0)) % 1 + 1) % 1;   // 0..1
  const d = u < 0.5 ? u*2 : (1-u)*2;                   // треугольник 0..1..0
  const off = d*span, v = (u < 0.5 ? m.speed : -m.speed);
  const horiz = m.dir === 'h';
  return { x:m.cx*T + (horiz?off:0), y:m.cy*T + (horiz?0:off),
           w:m.w*T, h:T, vx:horiz?v:0, vy:horiz?0:v };
}
function refreshMovers(t){ moverCache = level.movers.map(m=>moverRect(m,t)); }
function moverAtPoint(px,py){
  for(let i=0;i<moverCache.length;i++){
    const r = moverCache[i];
    if(px>=r.x && px<=r.x+r.w && py>=r.y && py<=r.y+r.h) return i;
  }
  return -1;
}
// посадка на платформу сверху (односторонняя: снизу и сбоку сквозная)
function moverLandCCD(ptipY, tipX, tipY){
  for(let i=0;i<moverCache.length;i++){
    const r = moverCache[i];
    if(tipX < r.x-2 || tipX > r.x+r.w+2) continue;
    if(ptipY <= r.y+5 && tipY >= r.y && tipY <= r.y + r.h + 6) return { i, r };
  }
  return null;
}
function supportAt(px,py){ return solidAt(px,py) || moverAtPoint(px,py) >= 0; }

function defaultLevel(){
  const L = emptyLevel();
  const row = (x0,x1,y)=>{ for(let x=x0;x<=x1;x++) L.blocks.add(key(x,y)); };
  row(-3,12,12); row(-3,12,13);
  row(15,20,12); row(15,20,13);
  L.blocks.add(key(20,11));
  row(23,26,10);
  for(let y=6;y<=12;y++) L.blocks.add(key(29,y));
  row(30,38,12); row(30,38,13);
  row(34,36,9);
  L.start = {cx:1, cy:11}; L.flag = {cx:35, cy:8};
  return L;
}

/* ============ встроенные уровни ============ */
// В build доступны: R — блоки, spike — шипы, tramp — батуты, brk — хрупкие,
// mover(cx,cy,ширина,'h'|'v',дальность,скорость,фаза) — платформа.
// start/flag — [клетка X, клетка Y]: ПУСТАЯ клетка прямо над поверхностью.
const LEVELS = [
  { name:'Первые прыжки', tip:'Зажми пробел, отпусти — прыжок. ← → — наклон. Чем дольше держишь, тем дальше.',
    start:[2,10], flag:[43,10],
    build:({R})=>{ R(0,11,12,15); R(17,11,28,15); R(33,11,45,15); } },

  { name:'Ступеньки', tip:'Наклоняйся в сторону прыжка и добавляй заряд, чтобы забраться выше.',
    start:[2,11], flag:[36,7],
    build:({R})=>{ R(0,12,8,17); R(11,11,15,17); R(18,10,22,17); R(25,9,29,17); R(32,8,40,17); } },

  { name:'Через пропасть', tip:'Полный заряд + наклон ~30° — самый дальний прыжок.',
    start:[2,11], flag:[47,11],
    build:({R})=>{ R(0,12,6,17); R(14,12,20,17); R(28,12,34,17); R(42,12,52,17); } },

  { name:'Колонны', tip:'Верхушки узкие — целься точно. Приземлился боком — упал.',
    start:[2,13], flag:[35,8],
    build:({R})=>{ R(0,14,4,20); R(8,10,9,20); R(14,8,15,20); R(20,11,21,20); R(26,7,27,20); R(32,9,40,20); } },

  { name:'Стены', tip:'Задел стену с зажатым пробелом — отпусти, и оттолкнёшься от неё.',
    start:[2,13], flag:[38,3],
    build:({R})=>{ R(0,14,6,20); R(10,10,12,20); R(16,7,18,20); R(22,4,24,20); R(28,4,40,20); } },

  { name:'Башня', tip:'Зигзагом вверх. Не стукнись головой о нижнюю сторону платформ!',
    start:[2,17], flag:[15,3],
    build:({R})=>{ R(0,18,8,24); R(12,15,17,16); R(3,12,8,13); R(12,9,17,10); R(3,6,8,7); R(11,4,18,5); } },

  { name:'Шипы', tip:'🔺 Шипы убивают от любого касания. Перепрыгивай их с запасом.',
    start:[2,11], flag:[45,11],
    build:({R,spike})=>{
      R(0,12,10,17); spike(11,11,13,11); R(11,12,16,17);
      R(20,12,26,17); spike(27,11,30,11); R(27,12,34,17);
      R(38,12,50,17); spike(35,11,37,11); R(35,12,37,17);
    } },

  { name:'Батуты', tip:'🟣 Батут подкидывает сам — заряд не нужен. Целься наклоном в полёте.',
    start:[2,13], flag:[46,5],
    build:({R,tramp})=>{
      R(0,14,6,20);
      tramp(10,14,13,14); R(10,15,13,20);
      tramp(19,16,22,16); R(19,17,22,20);
      tramp(28,13,31,13); R(28,14,31,20);
      R(38,6,50,20);
    } },

  { name:'Хрупкий путь', tip:'🟤 Хрупкие блоки крошатся под тобой — не задерживайся.',
    start:[2,11], flag:[44,11],
    build:({R,brk})=>{
      R(0,12,6,17);
      brk(10,12,13,12); brk(17,12,20,12); brk(24,12,27,12); brk(31,12,34,12);
      R(38,12,48,17);
    } },

  { name:'Лифты', tip:'Платформы ездят сами. Прыгай с них и лови момент.',
    start:[2,13], flag:[44,7],
    build:({R,mover})=>{
      R(0,14,6,20);
      mover(9,13,3,'h',5,1.1,0);
      mover(19,8,3,'v',5,1.0,0.25);
      mover(28,12,3,'h',4,1.4,0.5);
      R(38,8,48,20);
    } },

  { name:'Всё сразу', tip:'Шипы, батуты, хрупкие блоки и платформы. Удачи!',
    start:[2,13], flag:[56,5],
    build:({R,spike,tramp,brk,mover})=>{
      R(0,14,6,20);
      spike(7,13,9,13); R(7,14,9,20);
      tramp(12,14,14,14); R(12,15,14,20);
      brk(19,10,22,10);
      mover(26,9,3,'h',5,1.2,0);
      brk(35,9,37,9);
      tramp(41,12,43,12); R(41,13,43,20);
      spike(44,11,46,11); R(44,12,46,20);
      R(50,6,60,20);
    } },

  { name:'Гребёнка', tip:'Потолок из шипов — только короткие прыжки. Пол крошится, под ним тоже шипы.',
    start:[2,13], flag:[46,7],
    build:({R,spike,tramp,brk,mover})=>{
      R(0,14,5,20);
      spike(6,17,27,17); R(6,18,27,20);                 // дно ямы — шипы
      spike(7,8,25,8);                                  // низкий потолок из шипов
      brk(7,14,9,14); brk(12,14,14,14);                 // хрупкие островки над шипами
      brk(17,14,19,14); brk(22,14,24,14);
      R(27,15,31,20); tramp(27,14,31,14);               // выход: батут, над ним чисто
      mover(35,8,3,'h',5,1.2,0);
      R(41,8,51,20);
    } },

  { name:'Пресс', tip:'⏱ 40 с! Длинный коридор: пол и потолок из шипов, между лифтами не встать. Спрыгивай до верха каждого лифта!',
    timeLimit:40, start:[2,19], flag:[72,19],
    build:({R,spike,mover})=>{
      R(0,20,5,26);
      spike(6,25,65,25); R(6,26,65,26);                 // дно — шипы по всей длине
      spike(6,6,65,6);                                  // потолок — шипы (высоко не прыгнешь)
      // 9 лифтов с длинным ходом (наверху расплющит о потолок) — единственные ступени
      mover(8,8,3,'v',15,3.0,0.0);
      mover(15,8,3,'v',15,3.5,0.35);
      mover(22,8,3,'v',15,2.8,0.7);
      mover(29,8,3,'v',15,3.6,0.15);
      mover(36,8,3,'v',15,3.1,0.5);

function buildLevel(def){
  const L = emptyLevel();
  const fill = set => (x0,y0,x1,y1)=>{ for(let y=y0;y<=y1;y++) for(let x=x0;x<=x1;x++) set.add(key(x,y)); };
  def.build({
    R: fill(L.blocks), spike: fill(L.spikes), tramp: fill(L.tramp), brk: fill(L.breakable),
    mover: (cx,cy,w,dir,range,speed,phase)=> L.movers.push({cx,cy,w,dir,range,speed,phase:phase||0}),
    // наклонный батут: кидает под фиксированным углом deg (вправо >0, влево <0)
    trampA: (x0,y0,x1,y1,deg)=>{ const a=deg*Math.PI/180;
      for(let y=y0;y<=y1;y++) for(let x=x0;x<=x1;x++){ const k=key(x,y); L.tramp.add(k); L.trampAngle.set(k,a); } }
  });
  L.start = {cx:def.start[0], cy:def.start[1]};
  L.flag  = {cx:def.flag[0],  cy:def.flag[1]};
  L.moon  = !!def.moon;
  L.goal  = def.goal || null;
  L.timeLimit = def.timeLimit || 0;
  return L;
}

/* ============ звук ============ */
// Положи рядом с этим файлом jump.wav, crash.wav и bgm.wav — они подхватятся сами.
// Если файлов нет, игра просто работает молча (ошибки гасятся).
function makeSound(src, vol, loop){
  if(typeof Audio === 'undefined') return null;
  try{
    const a = new Audio(src);
    a.volume = vol; if(loop) a.loop = true;
    a.addEventListener('error', ()=>{});     // нет файла — тихо игнорируем
    return a;
  }catch(e){ return null; }
}
const SFX = {
  jump:    makeSound('jump.wav',  0.55),
  crash:   makeSound('crash.wav', 0.65),
  bgm:     makeSound('bgm.wav',   0.35, true),   // обычная музыка
  bgmMoon: makeSound('bgmm.wav',  0.35, true),   // музыка лунных уровней
};
let muted = false, bgmStarted = false, curBgm = null;
function playSfx(name){
  if(muted) return;
  const a = SFX[name];
  if(!a) return;
  try{
    a.currentTime = 0;
    const pr = a.play();
    if(pr && pr.catch) pr.catch(()=>{});      // браузер может запретить автозапуск
  }catch(e){}
}
// на луне играет bgmm.wav, в остальных местах — bgm.wav; переключается само
function wantedBgm(){ return (level && level.moon) ? SFX.bgmMoon : SFX.bgm; }
function updateBgm(){
  if(!bgmStarted) return;
  const want = wantedBgm();
  if(want === curBgm) return;                 // трек уже верный
  if(curBgm){ try{ curBgm.pause(); }catch(e){} }
  curBgm = want;
  if(curBgm && !muted){
    try{
      curBgm.currentTime = 0;
      const pr = curBgm.play();
      if(pr && pr.catch) pr.catch(()=>{});
    }catch(e){}
  }
}
function startBgm(){                          // музыку можно включать только после действия игрока
  if(bgmStarted) return;
  bgmStarted = true;
  updateBgm();
}
function setMuted(v){
  muted = v;
  if(!curBgm) return;
  try{ v ? curBgm.pause() : curBgm.play().catch(()=>{}); }catch(e){}
}

/* ============ очки и трюки ============ */
let score = 0, combo = 0, spinAccum = 0, peakSpeed = 0, levelFrames = 0, popups = [];
let started = false;            // таймер идёт только после первого действия игрока
let sinceTrick = 0;             // кадров без новых очков (комбо остывает за 3 с)
let flatJumps = 0;              // подряд прыжков без наклона (защита от фарма на месте)
let airFlips = 0;               // кувырков в текущем полёте
let pendingPts = 0;             // очки за трюки полёта: копятся в воздухе, начисляются при посадке
let launchX = 0;                // X в момент отрыва (для дальнего перелёта)
const COMBO_COOLDOWN = 180;
const FLIP_TURN = Math.PI*1.5;  // кувырок засчитывается уже с 270°
const FLAT_LEAN = 0.15;         // |угол| меньше — считаем «прыжок на месте» (~9°)
function resetScore(){
  score = 0; combo = 0; spinAccum = 0; peakSpeed = 0; levelFrames = 0; popups = [];
  started = false; sinceTrick = 0; flatJumps = 0; airFlips = 0; pendingPts = 0; launchX = 0;
}
// вызывается в момент толчка: запоминаем, был ли наклон
function noteJumpLean(a){
  if(Math.abs(a) < FLAT_LEAN) flatJumps++; else flatJumps = 0;
  airFlips = 0; spinAccum = 0;          // новый полёт — кувырки считаются заново
  launchX = player ? player.x : 0;      // точка отрыва — для бонуса за дальний перелёт
}
const FAR_CELLS = 14;                   // с какой дистанции перелёт считается «дальним»
function awardPlatformLand(){           // приземлился на движущуюся платформу
  if(tricksBlocked()) return;
  combo++; sinceTrick = 0;
  pendingPts += Math.round(150 * comboMult());
  popup('Платформа!', 0, 'pend');
}
// более двух прыжков подряд без наклона — очки не начисляются
function tricksBlocked(){ return flatJumps > 2; }
// style: 'gain' — начислено (жёлтый, с +N), 'pend' — в копилке (белый), 'bad' — потеря (красный)
function popup(text, pts, style){
  const p = player; if(!p) return;
  popups.push({ x:p.x, y:p.y - 46, text, pts, style: style || (pts>0 ? 'gain' : 'bad'), life:70 });
}
function comboMult(){ return 1 + Math.max(0, combo-1)*0.5; }

function trackAirTricks(p, aBefore){
  spinAccum += Math.abs(p.a - aBefore);
  peakSpeed = Math.max(peakSpeed, Math.hypot(p.vx, p.vy));
  // кувырок засчитывается СРАЗУ, как только накрутил 270° — не дожидаясь посадки
  while(spinAccum >= FLIP_TURN){
    spinAccum -= FLIP_TURN;
    awardFlip();
  }
}
// на лунных челленджах в воздухе висишь втрое дольше, поэтому кувырок там стоит впятеро дешевле
function flipValue(){ return (level.moon && level.goal) ? 24 : 120; }
const WALL_JUMP_PTS = 250;
function awardWallJump(){
  if(tricksBlocked()) return;
  combo++; sinceTrick = 0;                      // комбо обновляется сразу, как и от кувырка
  pendingPts += Math.round(WALL_JUMP_PTS * comboMult());   // очки — в копилку до приземления
  popup('От стены!', 0, 'pend');
}
function awardFlip(){
  if(tricksBlocked()) return;
  airFlips++;                                   // каждый следующий кувырок в полёте дороже
  combo++; sinceTrick = 0;                      // комбо обновляется ПРЯМО В ВОЗДУХЕ (и не тухнет)
  pendingPts += Math.round(flipValue() * airFlips * comboMult());   // а очки — в копилку до приземления
  popup(airFlips === 1 ? 'Кувырок!' : airFlips+'× кувырок!', 0, 'pend');
}
// трюки засчитываются ТОЛЬКО при удачном приземлении (разбился — всё сгорает)
// приземлился — только теперь копилка полёта превращается в очки (разбился — всё сгорит)
function bankTricks(){
  if(tricksBlocked()){ pendingPts = 0; spinAccum = 0; peakSpeed = 0; return; }
  let pts = pendingPts;
  if(peakSpeed > 13){
    const sp = Math.round((peakSpeed-13)*45);
    if(sp > 0){ combo++; sinceTrick = 0; pts += Math.round(sp * comboMult()); }
  }
  if(player){
    const far = Math.abs(player.footX - launchX) / T;
    if(far >= FAR_CELLS){ combo++; sinceTrick = 0; pts += Math.round((far-FAR_CELLS+4)*30 * comboMult()); }
  }
  if(pts > 0){
    score += pts;
    popup('Засчитано!' + (combo > 1 ? '  x'+comboMult().toFixed(1) : ''), pts, 'gain');
  }
  pendingPts = 0; spinAccum = 0; peakSpeed = 0;
}
function perfectJump(){
  if(tricksBlocked()) return;           // молча: подряд прыжки на месте не считаются
  combo++; sinceTrick = 0;
  const total = Math.round(80 * comboMult());
  score += total;
  popup('Идеально!  x'+comboMult().toFixed(1), total);
}
function loseCombo(){
  if(combo > 0 || pendingPts > 0)
    popup(pendingPts > 0 ? 'Потеряно ' + pendingPts + ' очков!' : 'Комбо сорвано', 0, 'bad');
  combo = 0; spinAccum = 0; peakSpeed = 0; pendingPts = 0;   // незабанкованные трюки сгорают
}

/* ============ хрупкие блоки ============ */
function touchBreakable(k){
  if(level.breakable.has(k) && !broken.has(k) && !breakTimers.has(k)) breakTimers.set(k, BREAK_TIME);
}
function tickBreakables(){
  for(const [k,t] of [...breakTimers]){
    if(t <= 1){ breakTimers.delete(k); broken.add(k); shake = Math.max(shake, 3); }
    else breakTimers.set(k, t-1);
  }
}   // момент «заваливания» в сторону наклона при приземлении (слабый)

function spawnPlayer(){
  const sx = level.start.cx*T + T/2;
  const sy = level.start.cy*T + T/2 - 10;
  player = { x:sx, y:sy - STICK, vx:0, vy:0, a:0, av:0, squash:0, air:0,
             grounded:false, charge:0, jumpPrev:false, footX:sx, footY:sy,
             ptipX:sx, ptipY:sy,                 // позиция кончика в прошлом кадре (для CCD)
             wallCoyote:0, wallNX:0, wallNY:0,    // недавнее касание стены (для прыжка от стены по отпусканию)
             footVX:0, landSpin:0, settle:0,      // инерция: скольжение ножки, доворот и заваливание
             onMover:-1, sinceLanding:999,        // езда на платформе и окно «идеального» прыжка
             turnTo:0, turnT:0 };                 // плавный доворот наклона после наклонного батута
  ragdoll = null; outcome = null; confetti = [];
  broken = new Set(); breakTimers = new Map();    // хрупкие блоки восстанавливаются на новой попытке
  moverT = 0; refreshMovers(0);
  resetScore();
}

const kRight = ()=> keys['ArrowRight']||keys['KeyD']||touch.r;
const kJump  = ()=> keys['Space']||keys['ArrowUp']||keys['KeyW']||touch.j;

const touch = {l:false,r:false,j:false};
function bindTouch(id, prop){
  const el = document.getElementById(id);
  el.addEventListener('pointerdown', e=>{ touch[prop]=true; e.preventDefault(); });
  el.addEventListener('pointerup',   ()=>touch[prop]=false);
  el.addEventListener('pointercancel',()=>touch[prop]=false);
  el.addEventListener('pointerleave',()=>touch[prop]=false);
}

/* ============ физика пого ============ */
function pointPushOut(px,py){
  // выталкиваем точку из клетки к БЛИЖАЙШЕЙ грани, у которой сосед пустой
  const cX = Math.floor(px/T), cY = Math.floor(py/T);
  const lx = px - cX*T, ly = py - cY*T;
  const cand = [];
  if(!solidCell(cX,cY-1)) cand.push({d:ly,   x:0,           y:-ly-0.01});   // вверх (пол)
  if(!solidCell(cX,cY+1)) cand.push({d:T-ly, x:0,           y:(T-ly)+0.01}); // вниз (потолок)
  if(!solidCell(cX-1,cY)) cand.push({d:lx,   x:-lx-0.01,    y:0});           // влево (стена)
  if(!solidCell(cX+1,cY)) cand.push({d:T-lx, x:(T-lx)+0.01, y:0});           // вправо (стена)
  if(cand.length===0) return {x:0, y:-ly-0.01, d:T};   // замуровано (редко)
  cand.sort((a,b)=>a.d-b.d);
  return {x:cand[0].x, y:cand[0].y, d:cand[0].d};   // d — глубина проникновения
}
// нормализуем угол в (-π, π], убирая накопленные обороты после сальто
function normAngle(a){
  a = a % (Math.PI*2);
  if(a >  Math.PI) a -= Math.PI*2;
  if(a < -Math.PI) a += Math.PI*2;
  return a;
}
// упирается ли пого-стик (палка+тело+голова) в блок, стоя ножкой в footX/footY под углом a.
// пробегаем точки вдоль оси «вверх», начиная чуть выше ножки, чтобы не задеть пол под собой.
function pogoObstructed(footX, footY, a){
  const ux = Math.sin(a), uy = -Math.cos(a);
  for(let s=8; s<=STICK+HEAD; s+=3){
    if(solidAt(footX + ux*s, footY + uy*s)) return true;
  }
  // голова — кружком, а не точкой
  const hx = footX + ux*(STICK+HEAD), hy = footY + uy*(STICK+HEAD);
  for(let k=0;k<6;k++){ const an=k/6*Math.PI*2;
    if(solidAt(hx+Math.cos(an)*8, hy+Math.sin(an)*8)) return true;
  }
  return false;
}
// CCD: пересёк ли кончик, двигаясь из ptip в tip, ВЕРХНЮЮ грань твёрдой клетки, падая сверху.
// Возвращает точку приземления {x, surfY} или null. Ловит углы и тонкие поверхности на скорости.
function tipLandCCD(ptipX, ptipY, tipX, tipY){
  const dx = tipX-ptipX, dy = tipY-ptipY;
  const steps = Math.max(1, Math.ceil(Math.hypot(dx,dy)/5));
  let prevX = ptipX, prevY = ptipY;
  for(let i=1;i<=steps;i++){
    const cx = ptipX + dx*i/steps, cy = ptipY + dy*i/steps;
    if(solidAt(cx, cy)){
      const cellX = Math.floor(cx/T), cellY = Math.floor(cy/T);
      // приземление: пришли сверху (пред. точка над верхом клетки) и верх открыт
      if(prevY <= cellY*T + 3 && !solidCell(cellX, cellY-1))
        return { x:cx, surfY:cellY*T };
      return null;   // вошли сбоку/снизу — это не приземление
    }
    prevX = cx; prevY = cy;
  }
  return null;
}
// упирается ли ВЕРХНЯЯ часть (ездок: тело+голова) в блок — это удар, а не скольжение
function riderInSolid(bodyX, bodyY, a){
  const ux = Math.sin(a), uy = -Math.cos(a);
  for(let s=0; s<=HEAD; s+=4){
    if(solidAt(bodyX + ux*s, bodyY + uy*s)) return true;
  }
  return false;
}

function stepPlayer(){
  const p = player;
  const tilt = (kRight()?1:0) - (kLeft()?1:0);
  const jump = kJump();
  const aBefore = p.a;

  if(!started && (tilt !== 0 || jump)) started = true;   // отсчёт идёт с первого движения
  if(started) levelFrames++;
  moverT++; refreshMovers(moverT);
  tickBreakables();

  // комбо остывает за 3 секунды без новых очков
  sinceTrick++;
  if(combo > 0 && sinceTrick > COMBO_COOLDOWN){ combo = 0; popup('Комбо остыло', 0); }

  // уровни-челленджи: набрать очки за отведённое время
  if(level.goal){
    if(score >= level.goal.score){ win(false); return; }
    if(started && levelFrames >= level.goal.time*60){ failGoal(); return; }
  }
  // обычные уровни с лимитом: не добрался до флага за отведённое время
  if(level.timeLimit && started && levelFrames >= level.timeLimit*60){ failTime(); return; }

  // наклон. На ЗЕМЛЕ — целевая угловая скорость: держишь — целишься, отпустил — угол замирает
  // (иначе он уползал к упору во время зарядки). В ВОЗДУХЕ — прежнее отзывчивое вращение.
  if(p.grounded){
    const targetAV = tilt * 0.05;
    const kApproach = tilt !== 0 ? 0.35 : 0.6;
    p.av += (targetAV - p.av) * kApproach;
    if(tilt === 0 && Math.abs(p.av) < 0.004) p.av = 0;
  } else {
    p.av += tilt * 0.0055;
    p.av *= 0.98;
  }

  if(p.grounded){
    /* --- СТОИМ на воткнутой ножке, тело вращается вокруг неё --- */
    p.sinceLanding++;
    // опора под ножкой исчезла (хрупкий блок раскрошился) — падаем
    if(p.onMover < 0 && !solidAt(p.footX, p.footY + 3)){
      p.grounded = false; p.vx = p.footVX; p.vy = 0; p.footVX = 0;
      p.jumpPrev = jump; return;
    }
    // едем на движущейся платформе
    if(p.onMover >= 0){
      const r = moverCache[p.onMover];
      if(!r){ p.onMover = -1; }
      else {
        p.footX += r.vx; p.footY = r.y - 0.01;
        if(p.footX < r.x - 4 || p.footX > r.x + r.w + 4){   // съехал с края платформы
          p.onMover = -1; p.grounded = false; p.vx = r.vx; p.vy = 0;
        }
      }
    }
    // инерция перемещения: ножка скользит с трением, но не съезжает с края и не лезет в стену
    if(Math.abs(p.footVX) > 0.08){
      const nfx = p.footX + p.footVX;
      const support = supportAt(nfx, p.footY+3);
      if(support && !pogoObstructed(nfx, p.footY, p.a)) p.footX = nfx;
      else p.footVX = 0;                 // край площадки или стена — стоп
      p.footVX *= 0.80;                  // трение (высокое — скольжение короткое)
    } else p.footVX = 0;

    const a0 = p.a;
    // «оседание» после приземления: гравитация заваливает В СТОРОНУ НАКЛОНА (момент ~ sin угла),
    // а входящее вращение лишь подмешивается. Поэтому наклон вправо валит вправо,
    // даже если крутился слабо влево или не крутился вовсе.
    if(p.settle > 0.01){
      p.landSpin += TOPPLE * Math.sin(p.a) * p.settle;
      p.settle *= 0.56;                                    // окно оседания короткое — завал проходит быстро
    } else p.settle = 0;
    p.a += p.av + p.landSpin;                              // прицел + инерция вращения/заваливания
    p.landSpin *= 0.86;                                    // трение доворота (быстро успокаивается)
    if(p.settle === 0 && Math.abs(p.landSpin) < 0.002) p.landSpin = 0;
    p.a = Math.max(-LEAN_MAX, Math.min(LEAN_MAX, p.a));   // не даём завалиться стоя
    // нельзя наклоняться сквозь блок: если новый угол вводит тело в стену — откатываем
    if(pogoObstructed(p.footX, p.footY, p.a)){
      p.a = a0; p.av = 0; p.landSpin = 0; p.settle = 0;
      // если и старый угол уже в блоке (встал вплотную под нависание) — заваливаемся
      if(pogoObstructed(p.footX, p.footY, p.a)){ p.jumpPrev = jump; crash(); return; }
    }
    const ux = Math.sin(p.a), uy = -Math.cos(p.a);
    p.x = p.footX + ux*STICK;    // корпус висит над ножкой вдоль наклона
    p.y = p.footY + uy*STICK;
    p.vx = 0; p.vy = 0;

    // ШИПЫ убивают и стоя: наклонился корпусом/головой в них — конец
    if(spikeAt(p.footX,p.footY) || spikeAt(p.x,p.y) || spikeAt(p.x+ux*HEAD, p.y+uy*HEAD)){
      p.jumpPrev = jump; crash('spikes'); return;
    }
    // хрупкий блок крошится и если на него ЗАЕХАТЬ скольжением, а не только приземлиться
    if(p.onMover < 0) touchBreakable(key(Math.floor(p.footX/T), Math.floor((p.footY+3)/T)));

    // зарядка прыжка: держишь — копится (с потолком), приседаешь
    if(jump){
      p.charge = Math.min(1, p.charge + CHARGE_RATE);
      p.squash = 0.35 + p.charge*0.65;
    } else {
      p.squash *= 0.8;
    }

    // отпустил пробел — прыжок в сторону наклона, сила от заряда
    if(p.jumpPrev && !jump){
      const power = MIN_JUMP + p.charge*(MAX_JUMP - MIN_JUMP);
      p.vx = ux*power; p.vy = uy*power;
      if(p.onMover >= 0 && moverCache[p.onMover]){       // платформа подкидывает своим импульсом
        p.vx += moverCache[p.onMover].vx; p.vy += moverCache[p.onMover].vy;
      }
      noteJumpLean(p.a);                                 // считаем прыжки без наклона
      playSfx('jump');
      if(p.sinceLanding <= PERFECT_W) perfectJump();     // отпустил сразу после посадки
      p.av *= 0.1;                 // чистый толчок без накопленного вращения
      p.landSpin = 0; p.settle = 0; p.footVX = 0;
      p.onMover = -1;
      p.grounded = false; p.charge = 0; p.air = 0;
      p.squash = 1.25;
      shake = Math.min(6, power*0.2);
    }

  } else {
    /* --- ПОЛЁТ: свободная физика --- */
    p.a += p.av;
    if(p.turnT > 0){                                       // плавный доворот наклона после наклонного батута
      if(tilt !== 0){ p.turnT = 0; }                       // игрок вмешался — сразу отдаём управление
      else { p.a += normAngle(p.turnTo - p.a) * 0.22; p.av = 0; p.turnT--; }
    }
    p.vy += gravity(); p.vy = Math.min(p.vy, 17);
    p.x += p.vx; p.y += p.vy;
    p.air++;
    trackAirTricks(p, aBefore);        // копим кувырки и пиковую скорость

    // зарядка прыжка прямо в воздухе — можно копить перед касанием пола/стены
    if(jump){ p.charge = Math.min(1, p.charge + CHARGE_RATE); p.squash = 0.35 + p.charge*0.65; }
    else p.squash *= 0.88;

    const ux = Math.sin(p.a), uy = -Math.cos(p.a);
    const tipX = p.x - ux*STICK, tipY = p.y - uy*STICK;
    const hX = p.x + ux*HEAD,   hY = p.y + uy*HEAD;

    // 0) ШИПЫ — смертельны от любого касания
    if(spikeAt(tipX,tipY) || spikeAt(p.x,p.y) || spikeAt(hX,hY)){
      p.jumpPrev = jump; crash('spikes'); return;
    }

    // 1) КОНЧИК коснулся верхней грани (CCD по траектории ptip->tip), либо платформы
    let landS = null, onMov = -1;
    if(p.vy > 0){
      landS = tipLandCCD(p.ptipX, p.ptipY, tipX, tipY);
      if(!landS){
        const mv = moverLandCCD(p.ptipY, tipX, tipY);
        if(mv){ landS = { x:tipX, surfY:mv.r.y }; onMov = mv.i; }
      }
    }
    if(landS){
      const na = normAngle(p.a);
      const fX = landS.x, fY = landS.surfY - 0.01;
      if(Math.abs(na) > LAND_TOL || pogoObstructed(fX, fY, na)){
        p.a = na; p.jumpPrev = jump; crash(); return;      // боком/телом в блок — падаем
      }
      const impact = Math.hypot(p.vx, p.vy);
      const surfK = key(Math.floor(fX/T), Math.round(landS.surfY/T));
      p.a = na;

      if(onMov < 0 && level.tramp.has(surfK)){
        // 🟣 БАТУТ — подкидывает сам, без заряда; заряд остаётся на потом
        bankTricks();
        const ta = level.trampAngle.get(surfK);
        let lux = ux, luy = uy;                            // направление ЗАПУСКА (скорости)
        if(ta !== undefined){
          lux = Math.sin(ta); luy = -Math.cos(ta);        // скорость идёт под углом батута...
          p.turnTo = ta; p.turnT = 12; p.av = 0;          // ...а наклон плавно доворачивается к нему (без резкого зеркалирования)
        }
        noteJumpLean(ta !== undefined ? ta : na);         // батут на месте тоже не фармится
        playSfx('jump');
        const bux = Math.sin(p.a), buy = -Math.cos(p.a);  // тело стоит вдоль ТЕКУЩЕГО наклона (p.a = na)
        p.x = fX + bux*STICK; p.y = fY + buy*STICK;
        p.vx = lux*TRAMP_POWER; p.vy = luy*TRAMP_POWER;   // скорость — в сторону батута
        p.air = 0; p.squash = 1.4; p.sinceLanding = 0;
        shake = 7;
      } else {
        bankTricks();                                       // трюки засчитываются на приземлении
        p.footX = fX; p.footY = fY;
        p.x = fX + ux*STICK; p.y = fY + uy*STICK;           // ставим кончик на поверхность и ВСТАЁМ
        p.footVX = p.vx * 0.45;                             // инерция перемещения -> короткое проскальзывание
        p.landSpin = Math.max(-0.05, Math.min(0.05, p.av * 0.18));  // вращение подмешивается слабо (наклон главнее)
        p.settle = 1;                                       // запускаем «оседание» — завалит в сторону наклона
        p.av = 0;                                           // аим-скорость сбрасываем (прицел остаётся точным)
        p.vx = 0; p.vy = 0;
        p.grounded = true; p.air = 0; p.squash = 0.9;
        p.onMover = onMov; p.sinceLanding = 0;
        if(onMov >= 0) awardPlatformLand();
        if(onMov < 0) touchBreakable(surfK);                // 🟤 хрупкий блок начинает крошиться
        if(!jump) p.charge = 0;      // держишь — заряд переносится на землю; отпустил — сброшен
        shake = Math.min(5, impact*0.2);
      }
    }
    // 2) УДАР ездоком (тело/голова) об блок => рэгдолл (не проталкиваем — иначе «тонет»)
    else if(solidAt(hX, hY) || riderInSolid(p.x, p.y, p.a)){
      p.jumpPrev = jump; crash(); return;
    }
    // 3) кончик задел стену/потолок (не приземление, ездок свободен) — скользим и ЗАПОМИНАЕМ стену
    else if(solidAt(tipX, tipY)){
      const push = pointPushOut(tipX, tipY);
      if(push.d > T*0.5){ p.jumpPrev = jump; crash(); return; }
      const nx2 = p.x + push.x, ny2 = p.y + push.y;
      if(solidAt(nx2 + ux*HEAD, ny2 + uy*HEAD) || riderInSolid(nx2, ny2, p.a)){
        p.jumpPrev = jump; crash(); return;
      }
      const nl = Math.hypot(push.x, push.y) || 1;
      const nx = push.x/nl, ny = push.y/nl;
      p.x = nx2; p.y = ny2;
      p.wallCoyote = 8; p.wallNX = nx; p.wallNY = ny;   // для прыжка от стены по отпусканию
      const vn = p.vx*nx + p.vy*ny;
      if(vn < 0){ p.vx -= nx*vn; p.vy -= ny*vn; }
    }

    // «койот-время» стены тает
    if(p.wallCoyote > 0) p.wallCoyote--;

    // ПРЫЖОК ТОЛЬКО ПО ОТПУСКАНИЮ (в воздухе — от стены, если недавно её касались)
    if(p.jumpPrev && !jump && !p.grounded){
      if(p.wallCoyote > 0){
        const uxN = Math.sin(p.a), uyN = -Math.cos(p.a);
        const power = MIN_JUMP + p.charge*(MAX_JUMP - MIN_JUMP);
        let dx = uxN + p.wallNX, dy = uyN + p.wallNY;   // средн. между осью пого и «от стены»
        const dl = Math.hypot(dx,dy) || 1; dx/=dl; dy/=dl;
        p.vx = dx*power; p.vy = dy*power;
        p.av *= 0.35; p.air = 0; p.squash = 1.25; p.wallCoyote = 0;
        awardWallJump();
        noteJumpLean(p.a); playSfx('jump');               // прыжок от стены
        shake = Math.min(6, power*0.2);
      }
      p.charge = 0;   // заряд потрачен/сброшен (в открытом воздухе — просто сброс)
    }
  }

  // финиш (по любой точке)
  const ux2 = Math.sin(p.a), uy2 = -Math.cos(p.a);
  const hX2 = p.x + ux2*HEAD,  hY2 = p.y + uy2*HEAD;
  const tX2 = p.x - ux2*STICK, tY2 = p.y - uy2*STICK;
  if(hitsFlag(p.x,p.y)||hitsFlag(hX2,hY2)||hitsFlag(tX2,tY2)) win(false);

  // запоминаем позицию кончика для CCD следующего кадра
  p.ptipX = tX2; p.ptipY = tY2;

  // улетел в бездну
  const maxY = worldBottom() + 400;
  if(p.y > maxY){ outcome='void'; loseCombo(); showMsg('Улетел в бездну! 🕳','Прыгай аккуратнее.'); }

  p.jumpPrev = jump;
}

function worldBottom(){
  let m = 0;
  level.blocks.forEach(k=>{ const y = +k.split(',')[1]; if(y>m) m=y; });
  return (m+1)*T;
}
function hitsFlag(px,py){
  if(level.goal) return false;         // на челленджах побеждают очками, а не флагом
  const f = level.flag;
  return px > f.cx*T-6 && px < (f.cx+1)*T+6 && py > (f.cy-1)*T && py < (f.cy+1)*T;
}

/* ============ рэгдолл (верле) ============ */
function crash(reason){
  const p = player;
  const ux = Math.sin(p.a), uy = -Math.cos(p.a);
  const fx = Math.cos(p.a), fy = Math.sin(p.a);
  const pt = (dx,dy)=>({x:p.x+ux*dy+fx*dx, y:p.y+uy*dy+fy*dx});
  const pegs = pt(0,-STICK*0.5);
  const P = {
    head: pt(0, HEAD-4),
    sho:  pt(0, 26),
    hip:  pt(-3, 4),
    ha1:  pt(-9, 4), ha2: pt(9, 4),
    ft1:  {x:pegs.x-7,y:pegs.y}, ft2:{x:pegs.x+7,y:pegs.y},
    sTop: {x:p.x, y:p.y},
    sTip: pt(0,-STICK),
  };
  const pts = [];
  const mk = (o, kick)=>{ 
    const rX = o.x-p.x, rY = o.y-p.y;
    const vx = p.vx - rY*p.av + (kick? (Math.random()-0.5)*3 : 0);
    const vy = p.vy + rX*p.av + (kick? -2-Math.random()*2 : 0);
    const q = {x:o.x, y:o.y, px:o.x-vx, py:o.y-vy};
    pts.push(q); return q;
  };
  const head=mk(P.head), sho=mk(P.sho), hip=mk(P.hip),
        ha1=mk(P.ha1), ha2=mk(P.ha2), ft1=mk(P.ft1), ft2=mk(P.ft2),
        sTop=mk(P.sTop,true), sTip=mk(P.sTip,true);
  const C = (a,b)=>({a,b,d:Math.hypot(a.x-b.x,a.y-b.y)});
  ragdoll = {
    pts,
    head, 
    links:[C(head,sho),C(sho,hip),C(sho,ha1),C(sho,ha2),C(hip,ft1),C(hip,ft2),C(head,hip)],
    stick:[C(sTop,sTip)],
    bodyLinks:null, t:0,
  };
  ragdoll.bodyLinks = ragdoll.links;
  outcome='crash'; shake = 10;
  playSfx('crash');
  loseCombo();
  if(reason==='spikes') showMsg('Насадился на шипы! 🔺','Шипы убивают от любого касания.');
  else showMsg('Бум! Головой об землю 💫','Ты свалился с пого-стика.');
}

function stepRagdoll(){
  const r = ragdoll; r.t++;
  for(const q of r.pts){
    const vx = (q.x-q.px)*0.995, vy = (q.y-q.py)*0.995;
    q.px = q.x; q.py = q.y;
    q.x += vx; q.y += vy + gravity();
  }
  const all = r.links.concat(r.stick);
  for(let it=0; it<6; it++){
    for(const c of all){
      const dx = c.b.x-c.a.x, dy = c.b.y-c.a.y;
      const d = Math.hypot(dx,dy)||0.001;
      const diff = (d - c.d)/d*0.5;
      c.a.x += dx*diff; c.a.y += dy*diff;
      c.b.x -= dx*diff; c.b.y -= dy*diff;
    }
    for(const q of r.pts){
      if(solidAt(q.x,q.y)){
        const push = pointPushOut(q.x,q.y);
        const vx=q.x-q.px, vy=q.y-q.py;
        q.x += push.x; q.y += push.y;
        // трение + слабый отскок
        if(push.y!==0){ q.py = q.y + vy*0.4; q.px = q.x - vx*0.55; }
        else { q.px = q.x + vx*0.4; q.py = q.y - vy*0.55; }
      }
    }
  }
  // финиш кувырком тоже засчитывается :)
  if(outcome==='crash'){
    for(const q of r.pts){ if(hitsFlag(q.x,q.y)){ win(true); break; } }
  }
}

const msgEl = document.getElementById('msg');
// btns: [{label, cls, fn}] — если не передать, подставляются стандартные
function showMsg(t, s, btns){
  document.getElementById('msgTitle').textContent = t;
  document.getElementById('msgText').style.whiteSpace = 'pre-line';

  });

function defaultBtns(){
  const list = [{label:'↻ Заново (R)', cls:'play', fn:restart}];
  if(curLevel >= 0) list.push({label:'☰ Уровни', fn:()=>setScreen('select')});
  else list.push({label:'✏ В редактор', fn:()=>setScreen('edit')});
  return list;
}
function hideMsg(){ msgEl.style.display='none'; }
function win(tumble){
  if(outcome==='win') return;
  outcome='win';
  const f = level.flag;
  for(let i=0;i<90;i++){
    confetti.push({x:f.cx*T+T/2, y:(f.cy-0.5)*T,
      vx:(Math.random()-0.5)*9, vy:-Math.random()*8-2,
      c:['#ff7a45','#6bbf59','#ffd23f','#4aa3df','#e05780'][i%5],
      r:Math.random()*6.28, life:70+Math.random()*50});
  }
  bankTricks();                                   // добить трюки последнего прыжка
  const secs = levelFrames/60;
  let info;
  if(level.goal){
    const left = Math.max(0, level.goal.time*60 - levelFrames)/60;
    const bonus = Math.round(left*25);
    score += bonus;
    info = 'Цель ' + level.goal.score + ' очков — взята за ' + secs.toFixed(1) + ' c\n' +
           'Бонус за остаток времени: ' + bonus + '\nИтого: ' + score;
  } else {
    const timeBonus = Math.max(0, Math.round(2500 - levelFrames*2.5));   // быстрее прошёл — больше очков
    const tricks = score;
    score += timeBonus;
    info = 'Трюки: ' + tricks + '   Бонус за время (' + secs.toFixed(1) + ' c): ' + timeBonus +
           '\nИтого: ' + score;
  }

  const btns = [];
  let rec = '';
  if(curLevel >= 0){
    const prev = (progress[curLevel] && progress[curLevel].best) || 0;
    if(score > prev) rec = '  ★ новый рекорд!';
    progress[curLevel] = { done:true, best:Math.max(prev, score), time:Math.min((progress[curLevel]&&progress[curLevel].time)||1e9, levelFrames) };
    saveProgress();
    const w = WORLDS[curWorld], pos = w.levels.indexOf(curLevel);
    if(pos >= 0 && pos + 1 < w.levels.length)
      btns.push({label:'▶ Следующий', cls:'play', fn:()=>startLevel(w.levels[pos+1])});
    btns.push({label:'↻ Заново', fn:restart});
    btns.push({label:'☰ Уровни', fn:()=>setScreen('select')});
  } else {
    btns.push({label:'↻ Заново', cls:'play', fn:restart});
    btns.push({label:'✏ В редактор', fn:()=>setScreen('edit')});
  }
  showMsg(level.goal ? 'Цель взята! 🎯' : (tumble ? 'Финиш кувырком! 🤸🏁' : 'Победа! 🏁'),
          info + rec, btns);
}
function failGoal(){
  if(outcome) return;
  outcome = 'timeout'; loseCombo();
  showMsg('Время вышло! ⏳',
          'Набрано ' + score + ' из ' + level.goal.score + '.\n' +
          'Кувырки подряд множат очки — не давай комбо остыть.');
}
function failTime(){
  if(outcome) return;
  outcome = 'timeout'; loseCombo();
  showMsg('Время вышло! ⏳', 'Нужно добраться до флага за ' + level.timeLimit + ' с. Двигайся быстрее!');
}

function startLevel(i){
  curLevel = i;

  hudName.textContent = (pos>=0 ? (pos+1)+'. ' : '') + LEVELS[i].name;   // номер внутри мира (как в списке)

}

/* прогресс */
async function saveProgress(){
  try{ if(window.storage) await window.storage.set('pogo:progress', JSON.stringify(progress)); }catch(e){}
}
async function loadProgress(){
  try{
    if(window.storage){
      const r = await window.storage.get('pogo:progress');
      if(r && r.value){
        progress = JSON.parse(r.value);
        for(const k in progress) if(progress[k] === true) progress[k] = {done:true, best:0};   // старый формат
      }
    }
  }catch(e){}
  renderLevels();
}
function worldDone(w){ return w.levels.filter(li=>progress[li] && progress[li].done).length; }
function renderWorlds(){
  const g = document.getElementById('worldGrid');
  g.innerHTML = '';
  WORLDS.forEach((w,wi)=>{
    const done = worldDone(w), total = w.levels.length, pct = Math.round(done/total*100);
    const b = document.createElement('button');
    b.className = 'world';
    b.style.background = w.color;
    b.innerHTML = '<div class="wname">'+w.icon+' '+w.name+'</div>' +
                  '<div class="wprog">'+done+' / '+total+' пройдено</div>' +
                  '<div class="wbar"><div class="wfill" style="width:'+pct+'%"></div></div>';
    b.onclick = ()=>{ curWorld = wi; setScreen('select'); };
    g.appendChild(b);
  });
}
function renderLevels(){
  const w = WORLDS[curWorld];
  document.getElementById('selTitle').textContent = w.icon + ' ' + w.name;
  const g = document.getElementById('levelGrid');
  g.innerHTML = '';
  w.levels.forEach((i,n)=>{
    const L = LEVELS[i];
    const b = document.createElement('button');
    const pr = progress[i];
    b.className = 'lvl' + (pr && pr.done ? ' done' : '');
    b.innerHTML = '<div class="num">Уровень '+(n+1)+'</div><div class="nm">'+L.name+'</div>' +
                  (pr && pr.best ? '<div class="best">★ '+pr.best+'</div>' : '');
    b.onclick = ()=> startLevel(i);
    g.appendChild(b);
  });
}

  } else {

    editorLevel.goal = { score:sc, time:tm };

  }
  syncGoalBtn();
};

/* HUD */
const hudScore = document.getElementById('hudScore');
const hudCombo = document.getElementById('hudCombo');
const hudTime  = document.getElementById('hudTime');
function updateHud(){
  if(level.goal){
    hudScore.textContent = score + ' / ' + level.goal.score;
    const left = Math.max(0, level.goal.time*60 - levelFrames)/60;
    hudTime.textContent = '⏳ ' + left.toFixed(1)+'s';
    hudTime.style.color = left < 10 ? '#e0483c' : '#5a6676';
  } else if(level.timeLimit){
    hudScore.textContent = score;
    const left = Math.max(0, level.timeLimit*60 - levelFrames)/60;
    hudTime.textContent = '⏳ ' + left.toFixed(1)+'s';
    hudTime.style.color = left < 5 ? '#e0483c' : '#5a6676';
  } else {
    hudScore.textContent = score;
    hudTime.textContent  = (levelFrames/60).toFixed(1)+'s';
    hudTime.style.color = '#5a6676';
  }
  hudCombo.textContent = combo > 1 ? 'x'+comboMult().toFixed(1) : '';
}

/* сохранение */
function levelToObj(L){
  return { v:4, b:[...L.blocks], t:[...L.tramp], k:[...L.breakable], s:[...L.spikes],
           m:L.movers.map(m=>({...m})), ta:[...L.trampAngle], st:L.start, fl:L.flag,
           mn:L.moon?1:0, gl:L.goal || null, tl:L.timeLimit || 0 };
}
function objToLevel(o){
  const L = emptyLevel();
  (o.b||o.blocks||[]).forEach(k=>L.blocks.add(k));
  (o.t||[]).forEach(k=>L.tramp.add(k));
  (o.k||[]).forEach(k=>L.breakable.add(k));
  (o.s||[]).forEach(k=>L.spikes.add(k));
  L.movers = (o.m||[]).map(m=>({...m}));
  (o.ta||[]).forEach(([k,a])=>L.trampAngle.set(k,a));
  L.start = o.st || o.start; L.flag = o.fl || o.flag;
  L.moon = !!o.mn; L.goal = o.gl || null; L.timeLimit = o.tl || 0;
  return L;
}
function serialize(){ return JSON.stringify(levelToObj(editorLevel)); }
function deserialize(s){
  editorLevel = objToLevel(JSON.parse(s));
  if(uiScreen==='edit') level = editorLevel;
}

/* ============ код уровня (экспорт/импорт) ============ */
// Данные пакуются, подписываются контрольной суммой и шифруются потоковым XOR.
// Честно: ключ лежит в этом же файле, так что это защита от подделки «на коленке»,
// а не настоящая криптография — расковырять при желании можно.
const CODE_KEY = [0x5b,0x2f,0x9c,0x74,0xa1,0x38,0xe6,0x0d,0x51,0xc3,0x7a,0x96,0x2e,0xb8,0x45,0xd7];
function codeMask(arr){
  let r = 0x9e37;
  for(let i=0;i<arr.length;i++){
    r = (r*1103515245 + 12345 + i) >>> 0;
    arr[i] ^= CODE_KEY[i % CODE_KEY.length] ^ ((r >>> 16) & 255);
  }
}
function hash32(bytes){ let h = 2166136261>>>0; for(const b of bytes){ h ^= b; h = Math.imul(h, 16777619)>>>0; } return h>>>0; }
function encodeLevel(L){
  const bytes = new TextEncoder().encode(JSON.stringify(levelToObj(L)));
  const h = hash32(bytes);
  const out = new Uint8Array(bytes.length + 4);
  out[0]=h&255; out[1]=(h>>>8)&255; out[2]=(h>>>16)&255; out[3]=(h>>>24)&255;
  out.set(bytes, 4);
  codeMask(out);
  let bin = '';
  for(let i=0;i<out.length;i+=4096) bin += String.fromCharCode.apply(null, out.subarray(i, i+4096));
  return 'PGJ1-' + btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function decodeLevel(code){
  code = (code||'').trim().replace(/\s+/g,'');
  if(!code.startsWith('PGJ1-')) throw new Error('Это не код уровня (должен начинаться с PGJ1-)');
  let b64 = code.slice(5).replace(/-/g,'+').replace(/_/g,'/');
  while(b64.length % 4) b64 += '=';
  let bin;
  try { bin = atob(b64); } catch(e){ throw new Error('Код повреждён'); }
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  codeMask(arr);                                    // XOR симметричен — тот же вызов расшифровывает
  if(arr.length < 5) throw new Error('Код повреждён');
  const h = (arr[0] | (arr[1]<<8) | (arr[2]<<16) | (arr[3]<<24)) >>> 0;
  const body = arr.subarray(4);
  if(hash32(body) !== h) throw new Error('Код повреждён или изменён');
  return objToLevel(JSON.parse(new TextDecoder().decode(body)));
}

/* ============ редактор: мышь ============ */
let dragging = false, panning = false, lastMx=0, lastMy=0, eraseDrag=false;
let hover = null;
cv.addEventListener('contextmenu', e=>e.preventDefault());
cv.addEventListener('pointerdown', e=>{
  startBgm();
  if(uiScreen!=='edit') return;
  lastMx = e.clientX; lastMy = e.clientY;
  if(e.button===2 || tool==='pan' || keys['Space']){ panning = true; return; }
  dragging = true;
  applyTool(e.clientX, e.clientY, false);
});
cv.addEventListener('pointermove', e=>{
  hover = {x:e.clientX, y:e.clientY};
  if(uiScreen!=='edit') return;
  if(panning){
    cam.x -= e.clientX - lastMx; cam.y -= e.clientY - lastMy;
    lastMx = e.clientX; lastMy = e.clientY; return;
  }
  if(dragging) applyTool(e.clientX, e.clientY, true);
});
window.addEventListener('pointerup', ()=>{ dragging=false; panning=false; });
cv.addEventListener('wheel', e=>{
  if(uiScreen!=='edit') return;
  cam.x += e.deltaX; cam.y += e.deltaY; e.preventDefault();
},{passive:false});

function clearCell(k){
  level.blocks.delete(k); level.tramp.delete(k); level.breakable.delete(k); level.spikes.delete(k);
  level.trampAngle.delete(k);
}
function applyTool(mx,my,drag){
  const wx = mx + cam.x, wy = my + cam.y;
  const cX = Math.floor(wx/T), cY = Math.floor(wy/T);
  const k = key(cX,cY);
  const busy = (cX===level.flag.cx&&cY===level.flag.cy) || (cX===level.start.cx&&cY===level.start.cy);
  const put = set => { if(!busy){ clearCell(k); set.add(k); } };

  if(tool==='block')      put(level.blocks);
  else if(tool==='spike') put(level.spikes);
  else if(tool==='tramp') put(level.tramp);
  else if(tool==='trampL'){ if(!busy){ clearCell(k); level.tramp.add(k); level.trampAngle.set(k, -EDIT_TRAMP_ANGLE*Math.PI/180); } }
  else if(tool==='trampR'){ if(!busy){ clearCell(k); level.tramp.add(k); level.trampAngle.set(k,  EDIT_TRAMP_ANGLE*Math.PI/180); } }
  else if(tool==='brk')   put(level.breakable);
  else if(tool==='erase'){
    clearCell(k);
    level.movers = level.movers.filter(m =>
      !(cY===m.cy && cX>=m.cx && cX<m.cx+m.w));       // платформа удаляется по её базовой клетке
  }
  else if(tool==='moverh' && !drag)
    level.movers.push({cx:cX, cy:cY, w:3, dir:'h', range:5, speed:1.2, phase:0});
  else if(tool==='moverv' && !drag)
    level.movers.push({cx:cX, cy:cY, w:3, dir:'v', range:4, speed:1.0, phase:0});
  else if(tool==='moveredit' && !drag) editMoverAt(cX,cY);
  else if(tool==='start' && !drag && !solidCell(cX,cY)) level.start = {cx:cX, cy:cY};
  else if(tool==='flag'  && !drag && !solidCell(cX,cY)) level.flag  = {cx:cX, cy:cY};
}
let EDIT_TRAMP_ANGLE = 35;    // угол наклонного батута в редакторе (градусы)
// клик по платформе -> настройка дальности и скорости
function editMoverAt(cX,cY){
  const m = level.movers.find(m => cY>=m.cy-0 && cY<=m.cy+0 && cX>=m.cx && cX<m.cx+m.w)
         || level.movers.find(m => Math.abs(cY-m.cy)<=1 && cX>=m.cx-1 && cX<m.cx+m.w+1);
  if(!m){ hintEl.textContent = 'Кликни ⚙ по платформе, чтобы задать её ход'; return; }
  const rng = parseInt(prompt('Дальность хода (в клетках):', m.range), 10);
  if(rng && rng>0) m.range = rng;
  const spd = parseFloat(prompt('Скорость (напр. 0.5 — медленно, 2 — быстро):', m.speed));
  if(spd && spd>0) m.speed = spd;
  const w = parseInt(prompt('Ширина платформы (в клетках):', m.w), 10);
  if(w && w>0) m.w = w;
  refreshMovers(moverT);
  hintEl.textContent = 'Платформа: ход ' + m.range + ' кл., скорость ' + m.speed + ', ширина ' + m.w;
}

/* ============ отрисовка ============ */
function draw(){
  if(level.moon) drawMoonSky(); else drawDaySky();

  let sx=0, sy=0;
  if(shake>0.3){ sx=(Math.random()-0.5)*shake; sy=(Math.random()-0.5)*shake; shake*=0.86; }
  cx.save();
  cx.translate(-cam.x + sx, -cam.y + sy);

  // блоки видимой области
  const c0x = Math.floor(cam.x/T)-1, c1x = Math.floor((cam.x+W)/T)+1;
  const c0y = Math.floor(cam.y/T)-1, c1y = Math.floor((cam.y+H)/T)+1;
  for(let gy=c0y; gy<=c1y; gy++){
    for(let gx=c0x; gx<=c1x; gx++){
      const k = key(gx,gy), x = gx*T, y = gy*T;
      if(level.spikes.has(k)){ drawSpikes(x,y); continue; }
      if(level.tramp.has(k)){ drawTramp(x,y, level.trampAngle.get(k)); continue; }
      if(level.breakable.has(k)){
        if(broken.has(k)) continue;
        drawBreakable(x,y,breakTimers.get(k)); continue;
      }
      if(!level.blocks.has(k)) continue;
      const P = level.moon ? {d:'#3f3c55', g:'#8f8aa8', s:'#7a7597'} : {d:'#8a5a3c', g:'#6bbf59', s:'#57a748'};
      cx.fillStyle = P.d;
      cx.fillRect(x,y,T,T);
      cx.fillStyle = 'rgba(0,0,0,.10)';
      cx.fillRect(x+4,y+10,10,7); cx.fillRect(x+22,y+22,12,8);
      if(!solidCell(gx,gy-1)){
        cx.fillStyle = P.g; cx.fillRect(x,y,T,10);
        cx.fillStyle = P.s;
        cx.fillRect(x+4,y+8,6,4); cx.fillRect(x+18,y+7,7,5); cx.fillRect(x+31,y+8,5,4);
      }
    }
  }
  drawMovers();

  if(!level.goal) drawFlag();
  drawStartMarker();

  if(uiScreen==='play'){
    if(ragdoll) drawRagdoll(); else if(player) drawRider();
    // конфетти
    for(const c of confetti){
      cx.save(); cx.translate(c.x,c.y); cx.rotate(c.r);
      cx.fillStyle = c.c; cx.fillRect(-3,-2,6,4); cx.restore();
    }
    drawPopups();
  } else if(uiScreen==='edit'){
    drawGrid(c0x,c1x,c0y,c1y);
    drawGhost();
  }
  cx.restore();
}

function drawDaySky(){
  const g = cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#9fd9ef'); g.addColorStop(1,'#eef7dc');
  cx.fillStyle = g; cx.fillRect(0,0,W,H);
  cx.fillStyle = 'rgba(255,255,255,.85)';
  for(let i=0;i<8;i++){
    const ox = ((i*467 - cam.x*0.35) % (W+300) + W+300) % (W+300) - 150;
    const oy = 60 + (i*97)%220 - cam.y*0.12;
    cloud(ox, oy, 1 + (i%3)*0.35);
  }
}
function drawMoonSky(){
  const g = cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#080b22'); g.addColorStop(1,'#2b2350');
  cx.fillStyle = g; cx.fillRect(0,0,W,H);
  // звёзды (детерминированные, с параллаксом)
  for(let i=0;i<90;i++){
    const h = (i*2654435761) % 100000;
    const ox = ((h%1600) - cam.x*0.15 % (W+200) + W+200) % (W+200) - 100;
    const oy = ((h/13)%800) - cam.y*0.06;
    if(oy < -20 || oy > H+20) continue;
    const r = (h%7)/7*1.4 + 0.6;
    cx.fillStyle = 'rgba(255,255,255,'+(0.35 + (h%5)/8)+')';
    cx.beginPath(); cx.arc(ox, oy, r, 0, 7); cx.fill();
  }
  // Земля вдалеке
  const ex = 140 - cam.x*0.04, ey = 120 - cam.y*0.03;
  cx.fillStyle = '#3a6fd8'; cx.beginPath(); cx.arc(ex, ey, 42, 0, 7); cx.fill();
  cx.fillStyle = '#4fae62';
  cx.beginPath(); cx.arc(ex-14, ey-8, 15, 0, 7); cx.arc(ex+16, ey+10, 12, 0, 7); cx.fill();
  cx.strokeStyle = 'rgba(160,200,255,.5)'; cx.lineWidth = 3;
  cx.beginPath(); cx.arc(ex, ey, 44, 0, 7); cx.stroke();
}
function cloud(x,y,s){
  cx.beginPath();
  cx.arc(x,y,18*s,0,7); cx.arc(x+22*s,y-8*s,14*s,0,7); cx.arc(x+42*s,y,16*s,0,7);
  cx.fill();
}

function drawGrid(c0x,c1x,c0y,c1y){
  cx.strokeStyle = 'rgba(35,48,67,.12)'; cx.lineWidth = 1;
  cx.beginPath();
  for(let gx=c0x; gx<=c1x; gx++){ cx.moveTo(gx*T, c0y*T); cx.lineTo(gx*T, c1y*T); }
  for(let gy=c0y; gy<=c1y; gy++){ cx.moveTo(c0x*T, gy*T); cx.lineTo(c1x*T, gy*T); }
  cx.stroke();
}
function drawGhost(){
  if(!hover) return;
  const gx = Math.floor((hover.x+cam.x)/T), gy = Math.floor((hover.y+cam.y)/T);
  cx.fillStyle = tool==='erase' ? 'rgba(224,87,128,.35)' : 'rgba(35,48,67,.18)';
  cx.fillRect(gx*T, gy*T, T, T);
  cx.strokeStyle = 'rgba(35,48,67,.6)'; cx.lineWidth = 2;
  cx.strokeRect(gx*T+1, gy*T+1, T-2, T-2);
}
function drawStartMarker(){
  const s = level.start;
  const x = s.cx*T+T/2, y = (s.cy+1)*T;
  cx.fillStyle = 'rgba(107,191,89,.9)';
  cx.beginPath(); cx.moveTo(x-13,y-4); cx.lineTo(x+13,y-4); cx.lineTo(x,y-18); cx.closePath(); cx.fill();
  cx.strokeStyle = '#233043'; cx.lineWidth=2; cx.stroke();
}
function drawSpikes(x,y){
  cx.fillStyle = '#9aa6b4';
  for(let i=0;i<3;i++){
    const sx = x + i*(T/3);
    cx.beginPath(); cx.moveTo(sx, y+T); cx.lineTo(sx+T/6, y+4); cx.lineTo(sx+T/3, y+T); cx.closePath(); cx.fill();
  }
  cx.strokeStyle = '#5c6673'; cx.lineWidth = 2;
  cx.beginPath(); cx.moveTo(x, y+T); cx.lineTo(x+T, y+T); cx.stroke();
}
function drawTramp(x,y,ang){
  cx.fillStyle = '#5b3a86'; cx.fillRect(x, y+12, T, T-12);   // основание всегда на полу
  if(ang){
    // наклонный батут: пружина повёрнута в сторону запуска + стрелка направления
    cx.save(); cx.translate(x+T/2, y+11); cx.rotate(ang);
    cx.fillStyle = '#b06ce0'; cx.fillRect(-T/2+3, -7, T-6, 12);
    cx.strokeStyle = '#3b2559'; cx.lineWidth = 2; cx.strokeRect(-T/2+3, -7, T-6, 12);
    cx.fillStyle = '#ffe08a';                                  // стрелка вдоль оси запуска
    cx.beginPath(); cx.moveTo(0,-16); cx.lineTo(-6,-6); cx.lineTo(6,-6); cx.closePath(); cx.fill();
    cx.restore();
  } else {
    cx.fillStyle = '#b06ce0'; cx.fillRect(x, y+2, T, 12);
    cx.strokeStyle = '#3b2559'; cx.lineWidth = 2; cx.strokeRect(x+1, y+2, T-2, T-3);
    cx.strokeStyle = 'rgba(255,255,255,.55)'; cx.lineWidth = 2;
    cx.beginPath(); cx.moveTo(x+6,y+8); cx.lineTo(x+T-6,y+8); cx.stroke();
  }
}
function drawBreakable(x,y,timer){
  const t = timer!=null ? 1 - timer/BREAK_TIME : 0;      // 0..1 — насколько раскрошился
  const j = t>0 ? (Math.random()-0.5)*2.5*t : 0;
  cx.save(); cx.translate(j, j);
  cx.fillStyle = t>0 ? '#b98a5e' : '#a8794f';
  cx.fillRect(x,y,T,T);
  cx.strokeStyle = '#6d4a2c'; cx.lineWidth = 2; cx.strokeRect(x+1,y+1,T-2,T-2);
  cx.strokeStyle = 'rgba(60,35,15,.75)'; cx.lineWidth = 1.6 + t*1.6;
  cx.beginPath();
  cx.moveTo(x+6,y+4); cx.lineTo(x+16,y+18); cx.lineTo(x+9,y+T-5);
  cx.moveTo(x+T-6,y+7); cx.lineTo(x+24,y+21); cx.lineTo(x+T-8,y+T-4);
  cx.stroke();
  cx.restore();
}
function drawMovers(){
  for(const r of moverCache){
    cx.fillStyle = '#3d4b5e'; cx.fillRect(r.x, r.y, r.w, r.h);
    cx.fillStyle = '#8ad0f0'; cx.fillRect(r.x, r.y, r.w, 7);
    cx.strokeStyle = '#233043'; cx.lineWidth = 2.5; cx.strokeRect(r.x+1, r.y+1, r.w-2, r.h-2);
    // стрелки направления
    cx.fillStyle = 'rgba(255,255,255,.65)';
    const mx = r.x + r.w/2, my = r.y + r.h/2 + 4;
    if(r.vx !== 0 || r.vy === 0){
      cx.beginPath(); cx.moveTo(mx-12,my); cx.lineTo(mx-5,my-5); cx.lineTo(mx-5,my+5); cx.fill();
      cx.beginPath(); cx.moveTo(mx+12,my); cx.lineTo(mx+5,my-5); cx.lineTo(mx+5,my+5); cx.fill();
    } else {
      cx.beginPath(); cx.moveTo(mx,my-10); cx.lineTo(mx-5,my-3); cx.lineTo(mx+5,my-3); cx.fill();
      cx.beginPath(); cx.moveTo(mx,my+8); cx.lineTo(mx-5,my+1); cx.lineTo(mx+5,my+1); cx.fill();
    }
  }
}
function drawPopups(){
  for(const q of popups){
    const a = Math.min(1, q.life/25);
    cx.globalAlpha = a;
    cx.font = 'bold 17px "Trebuchet MS", sans-serif';
    cx.textAlign = 'center';
    cx.lineWidth = 4; cx.strokeStyle = 'rgba(35,48,67,.85)';
    const txt = q.pts>0 ? q.text+'  +'+q.pts : q.text;
    cx.strokeText(txt, q.x, q.y);
    cx.fillStyle = q.style==='gain' ? '#ffd23f' : (q.style==='pend' ? '#ffffff' : '#ff9a9a');
    cx.fillText(txt, q.x, q.y);
    cx.globalAlpha = 1; cx.textAlign = 'start';
  }
}
function drawFlag(){
  const f = level.flag;
  const x = f.cx*T + T/2 - 8, base = (f.cy+1)*T;
  cx.strokeStyle = '#233043'; cx.lineWidth = 4; cx.lineCap='round';
  cx.beginPath(); cx.moveTo(x, base); cx.lineTo(x, base-66); cx.stroke();
  const fy = base-66;
  for(let i=0;i<4;i++) for(let j=0;j<2;j++){
    cx.fillStyle = (i+j)%2? '#233043':'#fdf8ee';
    cx.fillRect(x+ i*9, fy + j*9, 9, 9);
  }
  cx.strokeStyle = '#233043'; cx.lineWidth=2;
  cx.strokeRect(x, fy, 36, 18);
}

/* рисуем ездока */
function drawRider(){
  const p = player;
  const ux = Math.sin(p.a), uy = -Math.cos(p.a);
  const fx = Math.cos(p.a), fy = Math.sin(p.a);
  const P = (dx,dy)=>[p.x+ux*dy+fx*dx, p.y+uy*dy+fy*dx];
  const sq = p.squash;
  const tip = P(0,-STICK + sq*6);

  // палка + пружина
  cx.strokeStyle = '#ff7a45'; cx.lineWidth = 5; cx.lineCap = 'round';
  line(P(0,0), tip);
  cx.strokeStyle = '#233043'; cx.lineWidth = 3;
  const s0 = P(0,-STICK*0.55), s1 = P(0,-STICK*0.82 + sq*5);
  zigzag(s0, s1, 5, 7);
  // руль и подножки
  cx.strokeStyle = '#233043'; cx.lineWidth = 5;
  line(P(-13,2), P(13,2));
  line(P(-10,-STICK*0.5), P(10,-STICK*0.5));

  // человечек (приседает при отскоке)
  const crouch = sq*8;
  const feetL = P(-7,-STICK*0.5+3), feetR = P(7,-STICK*0.5+3);
  const hip   = P(-4, 6 - crouch*0.4);
  const sho   = P(-1, 27 - crouch);
  const headC = P(1, 38 - crouch);
  const kneeL = P(-13,-STICK*0.5+13), kneeR = P(13,-STICK*0.5+13);
  const handL = P(-11,3), handR = P(11,3);
  cx.strokeStyle = '#233043'; cx.lineWidth = 4.5; cx.lineJoin='round';
  line(feetL,kneeL); line(kneeL,hip); line(feetR,kneeR); line(kneeR,hip);
  line(hip,sho);
  line(sho,handL); line(sho,handR);
  // голова с каской
  cx.fillStyle = '#f4c08b';
  cx.beginPath(); cx.arc(headC[0],headC[1],9,0,7); cx.fill();
  cx.strokeStyle='#233043'; cx.lineWidth=2.5; cx.stroke();
  cx.fillStyle = '#e05780';
  cx.beginPath(); cx.arc(headC[0],headC[1],9.5,Math.PI+p.a, 2*Math.PI+p.a); cx.fill();

  // прицел + индикатор заряда: стоя (целишься) или заряжая в воздухе
  if(p.grounded || p.charge > 0.01){
    const aimLen = 34 + p.charge*46;
    const ax = p.x + ux*aimLen, ay = p.y + uy*aimLen;
    // пунктирная стрелка направления прыжка
    cx.save();
    cx.setLineDash([6,5]);
    cx.strokeStyle = p.charge>0 ? 'rgba(255,122,69,.9)' : 'rgba(35,48,67,.35)';
    cx.lineWidth = 3;
    line([p.x+ux*20, p.y+uy*20], [ax, ay]);
    cx.restore();
    if(p.charge>0){
      // наконечник
      const wx=-uy, wy=ux;
      cx.fillStyle = 'rgba(255,122,69,.95)';
      cx.beginPath();
      cx.moveTo(ax+ux*8, ay+uy*8);
      cx.lineTo(ax+wx*5, ay+wy*5);
      cx.lineTo(ax-wx*5, ay-wy*5);
      cx.closePath(); cx.fill();
    }
    // полоска заряда над головой
    if(p.charge>0.01){
      const bw=44, bh=7, bx=headC[0]-bw/2, by=headC[1]-26;
      cx.fillStyle='rgba(35,48,67,.85)'; roundRect(bx-2,by-2,bw+4,bh+4,5); cx.fill();
      const t=p.charge;
      cx.fillStyle = t<0.5 ? '#6bbf59' : t<0.85 ? '#ffd23f' : '#e0483c';
      roundRect(bx,by,bw*t,bh,4); cx.fill();
    }
  }
}
function roundRect(x,y,w,h,r){
  cx.beginPath();
  cx.moveTo(x+r,y); cx.arcTo(x+w,y,x+w,y+h,r); cx.arcTo(x+w,y+h,x,y+h,r);
  cx.arcTo(x,y+h,x,y,r); cx.arcTo(x,y,x+w,y,r); cx.closePath();
}
function line(a,b){ cx.beginPath(); cx.moveTo(a[0],a[1]); cx.lineTo(b[0],b[1]); cx.stroke(); }
function zigzag(a,b,n,amp){
  const dx=b[0]-a[0], dy=b[1]-a[1];
  const len=Math.hypot(dx,dy)||1, px=-dy/len, py=dx/len;
  cx.beginPath(); cx.moveTo(a[0],a[1]);
  for(let i=1;i<n;i++){
    const t=i/n, s=(i%2? 1:-1);
    cx.lineTo(a[0]+dx*t+px*amp*s, a[1]+dy*t+py*amp*s);
  }
  cx.lineTo(b[0],b[1]); cx.stroke();
}

function drawRagdoll(){
  const r = ragdoll;
  // палка улетает
  cx.strokeStyle = '#ff7a45'; cx.lineWidth = 5; cx.lineCap='round';
  const s = r.stick[0];
  line([s.a.x,s.a.y],[s.b.x,s.b.y]);
  // тело
  cx.strokeStyle = '#233043'; cx.lineWidth = 4.5;
  for(const c of r.links){
    if(c.a===r.head||c.b===r.head) continue;
    line([c.a.x,c.a.y],[c.b.x,c.b.y]);
  }
  cx.fillStyle = '#f4c08b';
  cx.beginPath(); cx.arc(r.head.x, r.head.y, 9, 0, 7); cx.fill();
  cx.strokeStyle='#233043'; cx.lineWidth=2.5; cx.stroke();
  // крестики-глаза
  cx.lineWidth=1.6;
  const e=(ex,ey)=>{ line([r.head.x+ex-2,r.head.y+ey-2],[r.head.x+ex+2,r.head.y+ey+2]);
                     line([r.head.x+ex+2,r.head.y+ey-2],[r.head.x+ex-2,r.head.y+ey+2]); };
  e(-3,-1); e(3,-1);
}

/* ============ главный цикл ============ */
let last = performance.now(), acc = 0;
function frame(now){
  acc += Math.min(50, now-last); last = now;
  while(acc >= 1000/60){
    acc -= 1000/60;
    if(uiScreen==='play'){
      if(ragdoll) stepRagdoll();
      else if(player && !outcome) stepPlayer();
      // камера следует
      const tx = (ragdoll? ragdoll.head.x : player.x) - W/2;
      const ty = (ragdoll? ragdoll.head.y : player.y) - H*0.55;
      cam.x += (tx-cam.x)*0.09; cam.y += (ty-cam.y)*0.09;
      for(const c of confetti){
        c.x+=c.vx; c.y+=c.vy; c.vy+=0.25; c.vx*=0.99; c.r+=0.15; c.life--;
      }
      confetti = confetti.filter(c=>c.life>0);
      for(const q of popups){ q.y -= 0.6; q.life--; }
      popups = popups.filter(q=>q.life>0);
      updateHud();
    }
    else {
      moverT++; refreshMovers(moverT);   // платформы живут и в меню, и в редакторе
      if(uiScreen==='menu' || uiScreen==='select' || uiScreen==='worlds') cam.x += 0.35;   // лёгкий дрейф фона
    }
  }
  draw();
  requestAnimationFrame(frame);
}
/* ============ старт ============ */
(async ()=>{
  try{
    if(window.storage){
      const r = await window.storage.get('pogo:level');
      if(r && r.value) deserialize(r.value);      // подтягиваем сохранённый свой уровень
    }
  }catch(e){}
  await loadProgress();
})();
cam.x = -60; cam.y = 120;
setScreen('menu');
requestAnimationFrame(frame);
</script>
