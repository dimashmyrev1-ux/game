<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Пого-Прыгун — игра с редактором уровней</title>
<style>
  :root{
    --ink:#233043; --paper:#fdf8ee; --accent:#ff7a45; --grass:#6bbf59;
    --sky1:#9fd9ef; --sky2:#e8f6dc; --btn:#ffffff; --btn-on:#233043;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;}
  canvas{display:block;position:fixed;inset:0;}
  #toolbar{
    position:fixed;top:10px;left:50%;transform:translateX(-50%);
    display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
    background:rgba(253,248,238,.92);border:3px solid var(--ink);
    border-radius:16px;padding:8px 10px;z-index:10;
    box-shadow:0 4px 0 rgba(35,48,67,.35);max-width:96vw;
  }
  .tb-btn{
    border:2.5px solid var(--ink);background:var(--btn);color:var(--ink);
    border-radius:10px;padding:6px 12px;font-weight:700;font-size:14px;cursor:pointer;
    box-shadow:0 2.5px 0 var(--ink);transition:transform .05s;
    user-select:none;
  }
  .tb-btn:active{transform:translateY(2px);box-shadow:0 .5px 0 var(--ink);}
  .tb-btn.on{background:var(--btn-on);color:#fff;}
  .tb-btn.play{background:var(--accent);color:#fff;}
  .sep{width:2px;background:var(--ink);opacity:.25;border-radius:2px;margin:2px 2px;}
  #msg{
    position:fixed;left:50%;top:42%;transform:translate(-50%,-50%);
    background:var(--paper);border:4px solid var(--ink);border-radius:20px;
    padding:22px 34px;text-align:center;z-index:20;
    box-shadow:0 6px 0 rgba(35,48,67,.35);display:none;
  }
  #msg h2{margin:0 0 6px;font-size:30px;color:var(--ink);}
  #msg p{margin:0 0 14px;color:#5a6676;font-size:15px;}
  #msg .tb-btn{font-size:16px;}
  #hint{
    position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
    background:rgba(35,48,67,.85);color:#fff;padding:6px 14px;border-radius:12px;
    font-size:13px;z-index:9;white-space:nowrap;max-width:96vw;overflow:hidden;text-overflow:ellipsis;
  }
  #touch{position:fixed;inset:auto 0 0 0;z-index:8;display:none;pointer-events:none;}
  #touch .tbn{
    pointer-events:auto;position:fixed;bottom:18px;width:70px;height:70px;border-radius:50%;
    border:3px solid var(--ink);background:rgba(253,248,238,.85);font-size:28px;
    display:flex;align-items:center;justify-content:center;user-select:none;color:var(--ink);font-weight:900;
  }
  #tL{left:18px} #tR{left:100px} #tJ{right:18px;width:86px;height:86px;background:rgba(255,122,69,.9);color:#fff;}
  @media (pointer:coarse){ #touch.playing{display:block;} }

  /* ---- экраны: меню и выбор уровня ---- */
  .screen{
    position:fixed;inset:0;z-index:30;display:none;
    flex-direction:column;align-items:center;justify-content:center;gap:14px;
    background:rgba(35,48,67,.45);backdrop-filter:blur(2px);padding:20px;
  }
  .panel{
    background:var(--paper);border:4px solid var(--ink);border-radius:24px;
    padding:26px 30px;text-align:center;box-shadow:0 8px 0 rgba(35,48,67,.35);
    max-width:min(640px,94vw);max-height:88vh;overflow:auto;
  }
  .panel h1{margin:0 0 4px;font-size:40px;color:var(--ink);letter-spacing:-1px;}
  .panel h2{margin:0 0 12px;font-size:26px;color:var(--ink);}
  .panel p{margin:0 0 18px;color:#5a6676;font-size:15px;}
  .tb-btn.big{font-size:19px;padding:12px 26px;border-radius:14px;margin:4px;}
  #levelGrid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:10px;margin-bottom:16px;
  }
  .lvl{
    border:3px solid var(--ink);background:#fff;border-radius:14px;padding:10px 8px;
    cursor:pointer;box-shadow:0 3px 0 var(--ink);text-align:left;transition:transform .05s;
  }
  .lvl:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink);}
  .lvl .num{font-size:12px;color:#8a97a8;font-weight:700;}
  .lvl .nm{font-size:15px;color:var(--ink);font-weight:700;line-height:1.2;}
  .lvl.done{background:#e8f7e2;}
  .lvl.done .nm::after{content:' ✓';color:var(--grass);}
  /* ---- HUD во время игры ---- */
  #hud{
    position:fixed;top:10px;left:50%;transform:translateX(-50%);
    display:none;gap:8px;align-items:center;z-index:10;
    background:rgba(253,248,238,.92);border:3px solid var(--ink);
    border-radius:16px;padding:6px 10px;box-shadow:0 4px 0 rgba(35,48,67,.35);
  }
  #hudName{font-weight:700;color:var(--ink);font-size:15px;padding:0 6px;}
</style>
</head>
<body>
<div id="toolbar">
  <button class="tb-btn play" id="bTest">▶ Тест</button>
  <button class="tb-btn" id="bMenu">☰ Меню</button>
  <span class="sep"></span>
  <button class="tb-btn tool on" data-tool="block" id="tBlock">🧱 Блок</button>
  <button class="tb-btn tool" data-tool="erase">🧽 Стереть</button>
  <button class="tb-btn tool" data-tool="start">🟢 Старт</button>
  <button class="tb-btn tool" data-tool="flag">🏁 Флаг</button>
  <button class="tb-btn tool" data-tool="pan">✋ Рука</button>
  <span class="sep"></span>
  <button class="tb-btn" id="bSave">💾</button>
  <button class="tb-btn" id="bLoad">📂</button>
  <button class="tb-btn" id="bClear">🗑</button>
</div>

<div id="msg">
  <h2 id="msgTitle"></h2>
  <p id="msgText"></p>
  <div id="msgBtns"></div>
</div>

<div id="menu" class="screen">
  <div class="panel">
    <h1>Пого-Прыгун</h1>
    <p>Скачи на пого-стике до флага 🏁<br>Ударишься головой — свалишься тряпичной куклой.</p>
    <button class="tb-btn big play" id="mPlay">▶ Уровни</button>
    <button class="tb-btn big" id="mEdit">✏ Редактор</button>
  </div>
</div>

<div id="select" class="screen">
  <div class="panel">
    <h2>Выбор уровня</h2>
    <div id="levelGrid"></div>
    <button class="tb-btn" id="sCustom">🧩 Свой уровень</button>
    <button class="tb-btn" id="sBack">← Назад</button>
  </div>
</div>

<div id="hud">
  <span id="hudName"></span>
  <button class="tb-btn" id="hRetry">↻</button>
  <button class="tb-btn" id="hMenu">☰</button>
</div>

<div id="hint"></div>

<div id="touch">
  <div class="tbn" id="tL">◀</div>
  <div class="tbn" id="tR">▶</div>
  <div class="tbn" id="tJ">⤒</div>
</div>

<canvas id="cv"></canvas>

<script>
"use strict";
/* ============ базовые вещи ============ */
const T = 40;                       // размер клетки
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W*DPR; cv.height = H*DPR;
  cv.style.width = W+'px'; cv.style.height = H+'px';
  cx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize); resize();

/* ============ уровень ============ */
let level = { blocks:new Set(), start:{cx:2, cy:11}, flag:{cx:30, cy:11} };
function key(cx_,cy_){ return cx_+','+cy_; }
function solidCell(cx_,cy_){ return level.blocks.has(key(cx_,cy_)); }
function solidAt(px,py){ return solidCell(Math.floor(px/T), Math.floor(py/T)); }

function defaultLevel(){
  const b = new Set();
  const row = (x0,x1,y)=>{ for(let x=x0;x<=x1;x++) b.add(key(x,y)); };
  row(-3,12,12);              // стартовая земля
  row(-3,12,13);
  row(15,20,12); row(15,20,13);   // после ямы
  b.add(key(20,11));
  row(23,26,10);              // ступенька выше
  for(let y=6;y<=12;y++) b.add(key(29,y));  // стена
  row(30,38,12); row(30,38,13);
  row(34,36,9);               // площадка с флагом
  return { blocks:b, start:{cx:1, cy:11}, flag:{cx:35, cy:8} };
}

/* ============ встроенные уровни ============ */
// R(x0,y0,x1,y1) — заливка прямоугольника блоками. start/flag — [клетка X, клетка Y]
// (клетка ПУСТАЯ, прямо над поверхностью, на которой стоишь)
const LEVELS = [
  { name:'Первые прыжки', tip:'Зажми пробел, отпусти — прыжок. ← → — наклон. Чем дольше держишь, тем дальше.',
    start:[2,10], flag:[43,10],
    build:R=>{ R(0,11,12,15); R(17,11,28,15); R(33,11,45,15); } },

  { name:'Ступеньки', tip:'Наклоняйся в сторону прыжка и добавляй заряд, чтобы забраться выше.',
    start:[2,11], flag:[36,7],
    build:R=>{ R(0,12,8,17); R(11,11,15,17); R(18,10,22,17); R(25,9,29,17); R(32,8,40,17); } },

  { name:'Через пропасть', tip:'Полный заряд + наклон ~30° — самый дальний прыжок.',
    start:[2,11], flag:[47,11],
    build:R=>{ R(0,12,6,17); R(14,12,20,17); R(28,12,34,17); R(42,12,52,17); } },

  { name:'Колонны', tip:'Верхушки узкие — целься точно. Приземлился боком — упал.',
    start:[2,13], flag:[35,8],
    build:R=>{ R(0,14,4,20); R(8,10,9,20); R(14,8,15,20); R(20,11,21,20); R(26,7,27,20); R(32,9,40,20); } },

  { name:'Стены', tip:'Задел стену с зажатым пробелом — отпусти, и оттолкнёшься от неё.',
    start:[2,13], flag:[38,3],
    build:R=>{ R(0,14,6,20); R(10,10,12,20); R(16,7,18,20); R(22,4,24,20); R(28,4,40,20); } },

  { name:'Башня', tip:'Зигзагом вверх. Не стукнись головой о нижнюю сторону платформ!',
    start:[2,17], flag:[15,3],
    build:R=>{ R(0,18,8,24); R(12,15,17,16); R(3,12,8,13); R(12,9,17,10); R(3,6,8,7); R(11,4,18,5); } },
];

function buildLevel(def){
  const b = new Set();
  const R = (x0,y0,x1,y1)=>{ for(let y=y0;y<=y1;y++) for(let x=x0;x<=x1;x++) b.add(key(x,y)); };
  def.build(R);
  return { blocks:b, start:{cx:def.start[0], cy:def.start[1]}, flag:{cx:def.flag[0], cy:def.flag[1]} };
}

level = buildLevel(LEVELS[0]);

/* ============ состояние ============ */
let uiScreen = 'menu';          // 'menu' | 'select' | 'play' | 'edit'
let curLevel = -1;            // индекс встроенного уровня, -1 = свой уровень (из редактора)
let progress = {};            // {индекс: true} — пройденные уровни
let editorLevel = defaultLevel();   // уровень, который правится в редакторе
let tool = 'block';
let cam = {x:-60, y:120};     // левый-верхний угол камеры в мире
let keys = {};
let player = null;            // пого-состояние
let ragdoll = null;           // тряпичная кукла
let outcome = null;           // null | 'win' | 'crash' | 'void'
let shake = 0;
let confetti = [];

const G = 0.42, STICK = 46, HEAD = 40;
// зарядка прыжка
const CHARGE_RATE = 0.04;    // за кадр (полный заряд ≈ 0.42 c)
const MIN_JUMP    = 6.5;     // сила лёгкого прыжка (короткое нажатие)
const MAX_JUMP    = 17.5;    // потолок заряда
const LEAN_MAX    = 1.4;     // ограничение наклона, пока стоишь
const LAND_TOL    = 1.15;    // если приземлился круче — заваливаешься в ragdoll
const TOPPLE      = 0.1;   // момент «заваливания» в сторону наклона при приземлении (слабый)

function spawnPlayer(){
  const sx = level.start.cx*T + T/2;
  const sy = level.start.cy*T + T/2 - 10;
  player = { x:sx, y:sy - STICK, vx:0, vy:0, a:0, av:0, squash:0, air:0,
             grounded:false, charge:0, jumpPrev:false, footX:sx, footY:sy,
             ptipX:sx, ptipY:sy,                 // позиция кончика в прошлом кадре (для CCD)
             wallCoyote:0, wallNX:0, wallNY:0,    // недавнее касание стены (для прыжка от стены по отпусканию)
             footVX:0, landSpin:0, settle:0 };    // инерция: скольжение ножки, доворот и заваливание при приземлении
  ragdoll = null; outcome = null; confetti = [];
}

/* ============ ввод ============ */
window.addEventListener('keydown', e=>{
  if(['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  keys[e.code] = true;
  if(e.code==='KeyR' && uiScreen==='play') restart();
  if(e.code==='Escape' && (uiScreen==='play'||uiScreen==='edit')) setScreen('menu');
  if(e.code==='KeyE') toggleMode();
});
window.addEventListener('keyup', e=>{ keys[e.code]=false; });
const kLeft  = ()=> keys['ArrowLeft']||keys['KeyA']||touch.l;
const kRight = ()=> keys['ArrowRight']||keys['KeyD']||touch.r;
const kJump  = ()=> keys['Space']||keys['ArrowUp']||keys['KeyW']||touch.j;

const touch = {l:false,r:false,j:false};
function bindTouch(id, prop){
  const el = document.getElementById(id);
  el.addEventListener('pointerdown', e=>{ touch[prop]=true; e.preventDefault(); });
  el.addEventListener('pointerup',   ()=>touch[prop]=false);
  el.addEventListener('pointercancel',()=>touch[prop]=false);
  el.addEventListener('pointerleave',()=>touch[prop]=false);
}
bindTouch('tL','l'); bindTouch('tR','r'); bindTouch('tJ','j');

/* ============ физика пого ============ */
function pointPushOut(px,py){
  // выталкиваем точку из клетки к БЛИЖАЙШЕЙ грани, у которой сосед пустой
  const cX = Math.floor(px/T), cY = Math.floor(py/T);
  const lx = px - cX*T, ly = py - cY*T;
  const cand = [];
  if(!solidCell(cX,cY-1)) cand.push({d:ly,   x:0,           y:-ly-0.01});   // вверх (пол)
  if(!solidCell(cX,cY+1)) cand.push({d:T-ly, x:0,           y:(T-ly)+0.01}); // вниз (потолок)
  if(!solidCell(cX-1,cY)) cand.push({d:lx,   x:-lx-0.01,    y:0});           // влево (стена)
  if(!solidCell(cX+1,cY)) cand.push({d:T-lx, x:(T-lx)+0.01, y:0});           // вправо (стена)
  if(cand.length===0) return {x:0, y:-ly-0.01, d:T};   // замуровано (редко)
  cand.sort((a,b)=>a.d-b.d);
  return {x:cand[0].x, y:cand[0].y, d:cand[0].d};   // d — глубина проникновения
}
// нормализуем угол в (-π, π], убирая накопленные обороты после сальто
function normAngle(a){
  a = a % (Math.PI*2);
  if(a >  Math.PI) a -= Math.PI*2;
  if(a < -Math.PI) a += Math.PI*2;
  return a;
}
// упирается ли пого-стик (палка+тело+голова) в блок, стоя ножкой в footX/footY под углом a.
// пробегаем точки вдоль оси «вверх», начиная чуть выше ножки, чтобы не задеть пол под собой.
function pogoObstructed(footX, footY, a){
  const ux = Math.sin(a), uy = -Math.cos(a);
  for(let s=8; s<=STICK+HEAD; s+=3){
    if(solidAt(footX + ux*s, footY + uy*s)) return true;
  }
  // голова — кружком, а не точкой
  const hx = footX + ux*(STICK+HEAD), hy = footY + uy*(STICK+HEAD);
  for(let k=0;k<6;k++){ const an=k/6*Math.PI*2;
    if(solidAt(hx+Math.cos(an)*8, hy+Math.sin(an)*8)) return true;
  }
  return false;
}
// CCD: пересёк ли кончик, двигаясь из ptip в tip, ВЕРХНЮЮ грань твёрдой клетки, падая сверху.
// Возвращает точку приземления {x, surfY} или null. Ловит углы и тонкие поверхности на скорости.
function tipLandCCD(ptipX, ptipY, tipX, tipY){
  const dx = tipX-ptipX, dy = tipY-ptipY;
  const steps = Math.max(1, Math.ceil(Math.hypot(dx,dy)/5));
  let prevX = ptipX, prevY = ptipY;
  for(let i=1;i<=steps;i++){
    const cx = ptipX + dx*i/steps, cy = ptipY + dy*i/steps;
    if(solidAt(cx, cy)){
      const cellX = Math.floor(cx/T), cellY = Math.floor(cy/T);
      // приземление: пришли сверху (пред. точка над верхом клетки) и верх открыт
      if(prevY <= cellY*T + 3 && !solidCell(cellX, cellY-1))
        return { x:cx, surfY:cellY*T };
      return null;   // вошли сбоку/снизу — это не приземление
    }
    prevX = cx; prevY = cy;
  }
  return null;
}
// упирается ли ВЕРХНЯЯ часть (ездок: тело+голова) в блок — это удар, а не скольжение
function riderInSolid(bodyX, bodyY, a){
  const ux = Math.sin(a), uy = -Math.cos(a);
  for(let s=0; s<=HEAD; s+=4){
    if(solidAt(bodyX + ux*s, bodyY + uy*s)) return true;
  }
  return false;
}

function stepPlayer(){
  const p = player;
  const tilt = (kRight()?1:0) - (kLeft()?1:0);
  const jump = kJump();

  // наклон. На ЗЕМЛЕ — целевая угловая скорость: держишь — целишься, отпустил — угол замирает
  // (иначе он уползал к упору во время зарядки). В ВОЗДУХЕ — прежнее отзывчивое вращение.
  if(p.grounded){
    const targetAV = tilt * 0.05;
    const kApproach = tilt !== 0 ? 0.35 : 0.6;
    p.av += (targetAV - p.av) * kApproach;
    if(tilt === 0 && Math.abs(p.av) < 0.004) p.av = 0;
  } else {
    p.av += tilt * 0.0055;
    p.av *= 0.98;
  }

  if(p.grounded){
    /* --- СТОИМ на воткнутой ножке, тело вращается вокруг неё --- */
    // инерция перемещения: ножка скользит с трением, но не съезжает с края и не лезет в стену
    if(Math.abs(p.footVX) > 0.08){
      const nfx = p.footX + p.footVX;
      const support = solidCell(Math.floor(nfx/T), Math.floor((p.footY+3)/T));
      if(support && !pogoObstructed(nfx, p.footY, p.a)) p.footX = nfx;
      else p.footVX = 0;                 // край площадки или стена — стоп
      p.footVX *= 0.80;                  // трение (высокое — скольжение короткое)
    } else p.footVX = 0;

    const a0 = p.a;
    // «оседание» после приземления: гравитация заваливает В СТОРОНУ НАКЛОНА (момент ~ sin угла),
    // а входящее вращение лишь подмешивается. Поэтому наклон вправо валит вправо,
    // даже если крутился слабо влево или не крутился вовсе.
    if(p.settle > 0.01){
      p.landSpin += TOPPLE * Math.sin(p.a) * p.settle;
      p.settle *= 0.56;                                    // окно оседания короткое — завал проходит быстро
    } else p.settle = 0;
    p.a += p.av + p.landSpin;                              // прицел + инерция вращения/заваливания
    p.landSpin *= 0.86;                                    // трение доворота (быстро успокаивается)
    if(p.settle === 0 && Math.abs(p.landSpin) < 0.002) p.landSpin = 0;
    p.a = Math.max(-LEAN_MAX, Math.min(LEAN_MAX, p.a));   // не даём завалиться стоя
    // нельзя наклоняться сквозь блок: если новый угол вводит тело в стену — откатываем
    if(pogoObstructed(p.footX, p.footY, p.a)){
      p.a = a0; p.av = 0; p.landSpin = 0; p.settle = 0;
      // если и старый угол уже в блоке (встал вплотную под нависание) — заваливаемся
      if(pogoObstructed(p.footX, p.footY, p.a)){ p.jumpPrev = jump; crash(); return; }
    }
    const ux = Math.sin(p.a), uy = -Math.cos(p.a);
    p.x = p.footX + ux*STICK;    // корпус висит над ножкой вдоль наклона
    p.y = p.footY + uy*STICK;
    p.vx = 0; p.vy = 0;

    // зарядка прыжка: держишь — копится (с потолком), приседаешь
    if(jump){
      p.charge = Math.min(1, p.charge + CHARGE_RATE);
      p.squash = 0.35 + p.charge*0.65;
    } else {
      p.squash *= 0.8;
    }

    // отпустил пробел — прыжок в сторону наклона, сила от заряда
    if(p.jumpPrev && !jump){
      const power = MIN_JUMP + p.charge*(MAX_JUMP - MIN_JUMP);
      p.vx = ux*power; p.vy = uy*power;
      p.av *= 0.1;                 // чистый толчок без накопленного вращения
      p.landSpin = 0; p.settle = 0; p.footVX = 0;
      p.grounded = false; p.charge = 0; p.air = 0;
      p.squash = 1.25;
      shake = Math.min(6, power*0.2);
    }

  } else {
    /* --- ПОЛЁТ: свободная физика --- */
    p.a += p.av;
    p.vy += G; p.vy = Math.min(p.vy, 17);
    p.x += p.vx; p.y += p.vy;
    p.air++;

    // зарядка прыжка прямо в воздухе — можно копить перед касанием пола/стены
    if(jump){ p.charge = Math.min(1, p.charge + CHARGE_RATE); p.squash = 0.35 + p.charge*0.65; }
    else p.squash *= 0.88;

    const ux = Math.sin(p.a), uy = -Math.cos(p.a);
    const tipX = p.x - ux*STICK, tipY = p.y - uy*STICK;
    const hX = p.x + ux*HEAD,   hY = p.y + uy*HEAD;

    // 1) КОНЧИК коснулся верхней грани (CCD по траектории ptip->tip).
    let landS = null;
    if(p.vy > 0) landS = tipLandCCD(p.ptipX, p.ptipY, tipX, tipY);
    if(landS){
      const na = normAngle(p.a);
      const fX = landS.x, fY = landS.surfY - 0.01;
      if(Math.abs(na) > LAND_TOL || pogoObstructed(fX, fY, na)){
        p.a = na; p.jumpPrev = jump; crash(); return;      // боком/телом в блок — падаем
      }
      const impact = Math.hypot(p.vx, p.vy);
      p.a = na;
      p.footX = fX; p.footY = fY;
      p.x = fX + ux*STICK; p.y = fY + uy*STICK;             // ставим кончик на поверхность и ВСТАЁМ
      p.footVX = p.vx * 0.45;                               // инерция перемещения -> короткое проскальзывание
      p.landSpin = Math.max(-0.05, Math.min(0.05, p.av * 0.18));  // вращение подмешивается слабо (наклон главнее)
      p.settle = 1;                                         // запускаем «оседание» — завалит в сторону наклона
      p.av = 0;                                             // аим-скорость сбрасываем (прицел остаётся точным)
      p.vx = 0; p.vy = 0;
      p.grounded = true; p.air = 0; p.squash = 0.9;
      if(!jump) p.charge = 0;        // держишь — заряд переносится на землю; отпустил — сброшен
      shake = Math.min(5, impact*0.2);
    }
    // 2) УДАР ездоком (тело/голова) об блок => рэгдолл (не проталкиваем — иначе «тонет»)
    else if(solidAt(hX, hY) || riderInSolid(p.x, p.y, p.a)){
      p.jumpPrev = jump; crash(); return;
    }
    // 3) кончик задел стену/потолок (не приземление, ездок свободен) — скользим и ЗАПОМИНАЕМ стену
    else if(solidAt(tipX, tipY)){
      const push = pointPushOut(tipX, tipY);
      if(push.d > T*0.5){ p.jumpPrev = jump; crash(); return; }
      const nx2 = p.x + push.x, ny2 = p.y + push.y;
      if(solidAt(nx2 + ux*HEAD, ny2 + uy*HEAD) || riderInSolid(nx2, ny2, p.a)){
        p.jumpPrev = jump; crash(); return;
      }
      const nl = Math.hypot(push.x, push.y) || 1;
      const nx = push.x/nl, ny = push.y/nl;
      p.x = nx2; p.y = ny2;
      p.wallCoyote = 8; p.wallNX = nx; p.wallNY = ny;   // для прыжка от стены по отпусканию
      const vn = p.vx*nx + p.vy*ny;
      if(vn < 0){ p.vx -= nx*vn; p.vy -= ny*vn; }
    }

    // «койот-время» стены тает
    if(p.wallCoyote > 0) p.wallCoyote--;

    // ПРЫЖОК ТОЛЬКО ПО ОТПУСКАНИЮ (в воздухе — от стены, если недавно её касались)
    if(p.jumpPrev && !jump && !p.grounded){
      if(p.wallCoyote > 0){
        const uxN = Math.sin(p.a), uyN = -Math.cos(p.a);
        const power = MIN_JUMP + p.charge*(MAX_JUMP - MIN_JUMP);
        let dx = uxN + p.wallNX, dy = uyN + p.wallNY;   // средн. между осью пого и «от стены»
        const dl = Math.hypot(dx,dy) || 1; dx/=dl; dy/=dl;
        p.vx = dx*power; p.vy = dy*power;
        p.av *= 0.35; p.air = 0; p.squash = 1.25; p.wallCoyote = 0;
        shake = Math.min(6, power*0.2);
      }
      p.charge = 0;   // заряд потрачен/сброшен (в открытом воздухе — просто сброс)
    }
  }

  // финиш (по любой точке)
  const ux2 = Math.sin(p.a), uy2 = -Math.cos(p.a);
  const hX2 = p.x + ux2*HEAD,  hY2 = p.y + uy2*HEAD;
  const tX2 = p.x - ux2*STICK, tY2 = p.y - uy2*STICK;
  if(hitsFlag(p.x,p.y)||hitsFlag(hX2,hY2)||hitsFlag(tX2,tY2)) win(false);

  // запоминаем позицию кончика для CCD следующего кадра
  p.ptipX = tX2; p.ptipY = tY2;

  // улетел в бездну
  const maxY = worldBottom() + 400;
  if(p.y > maxY){ outcome='void'; showMsg('Улетел в бездну! 🕳','Прыгай аккуратнее.'); }

  p.jumpPrev = jump;
}

function worldBottom(){
  let m = 0;
  level.blocks.forEach(k=>{ const y = +k.split(',')[1]; if(y>m) m=y; });
  return (m+1)*T;
}
function hitsFlag(px,py){
  const f = level.flag;
  return px > f.cx*T-6 && px < (f.cx+1)*T+6 && py > (f.cy-1)*T && py < (f.cy+1)*T;
}

/* ============ рэгдолл (верле) ============ */
function crash(){
  const p = player;
  const ux = Math.sin(p.a), uy = -Math.cos(p.a);
  const fx = Math.cos(p.a), fy = Math.sin(p.a);
  const pt = (dx,dy)=>({x:p.x+ux*dy+fx*dx, y:p.y+uy*dy+fy*dx});
  const pegs = pt(0,-STICK*0.5);
  const P = {
    head: pt(0, HEAD-4),
    sho:  pt(0, 26),
    hip:  pt(-3, 4),
    ha1:  pt(-9, 4), ha2: pt(9, 4),
    ft1:  {x:pegs.x-7,y:pegs.y}, ft2:{x:pegs.x+7,y:pegs.y},
    sTop: {x:p.x, y:p.y},
    sTip: pt(0,-STICK),
  };
  const pts = [];
  const mk = (o, kick)=>{ 
    const rX = o.x-p.x, rY = o.y-p.y;
    const vx = p.vx - rY*p.av + (kick? (Math.random()-0.5)*3 : 0);
    const vy = p.vy + rX*p.av + (kick? -2-Math.random()*2 : 0);
    const q = {x:o.x, y:o.y, px:o.x-vx, py:o.y-vy};
    pts.push(q); return q;
  };
  const head=mk(P.head), sho=mk(P.sho), hip=mk(P.hip),
        ha1=mk(P.ha1), ha2=mk(P.ha2), ft1=mk(P.ft1), ft2=mk(P.ft2),
        sTop=mk(P.sTop,true), sTip=mk(P.sTip,true);
  const C = (a,b)=>({a,b,d:Math.hypot(a.x-b.x,a.y-b.y)});
  ragdoll = {
    pts,
    head, 
    links:[C(head,sho),C(sho,hip),C(sho,ha1),C(sho,ha2),C(hip,ft1),C(hip,ft2),C(head,hip)],
    stick:[C(sTop,sTip)],
    bodyLinks:null, t:0,
  };
  ragdoll.bodyLinks = ragdoll.links;
  outcome='crash'; shake = 10;
  showMsg('Бум! Головой об землю 💫','Ты свалился с пого-стика.');
}

function stepRagdoll(){
  const r = ragdoll; r.t++;
  for(const q of r.pts){
    const vx = (q.x-q.px)*0.995, vy = (q.y-q.py)*0.995;
    q.px = q.x; q.py = q.y;
    q.x += vx; q.y += vy + G;
  }
  const all = r.links.concat(r.stick);
  for(let it=0; it<6; it++){
    for(const c of all){
      const dx = c.b.x-c.a.x, dy = c.b.y-c.a.y;
      const d = Math.hypot(dx,dy)||0.001;
      const diff = (d - c.d)/d*0.5;
      c.a.x += dx*diff; c.a.y += dy*diff;
      c.b.x -= dx*diff; c.b.y -= dy*diff;
    }
    for(const q of r.pts){
      if(solidAt(q.x,q.y)){
        const push = pointPushOut(q.x,q.y);
        const vx=q.x-q.px, vy=q.y-q.py;
        q.x += push.x; q.y += push.y;
        // трение + слабый отскок
        if(push.y!==0){ q.py = q.y + vy*0.4; q.px = q.x - vx*0.55; }
        else { q.px = q.x + vx*0.4; q.py = q.y - vy*0.55; }
      }
    }
  }
  // финиш кувырком тоже засчитывается :)
  if(outcome==='crash'){
    for(const q of r.pts){ if(hitsFlag(q.x,q.y)){ win(true); break; } }
  }
}

/* ============ победа / сообщения ============ */
const msgEl = document.getElementById('msg');
// btns: [{label, cls, fn}] — если не передать, подставляются стандартные
function showMsg(t, s, btns){
  document.getElementById('msgTitle').textContent = t;
  document.getElementById('msgText').textContent = s;
  const box = document.getElementById('msgBtns');
  box.innerHTML = '';
  (btns || defaultBtns()).forEach(b=>{
    const el = document.createElement('button');
    el.className = 'tb-btn ' + (b.cls||'');
    el.textContent = b.label;
    el.onclick = b.fn;
    box.appendChild(el);
  });
  msgEl.style.display = 'block';
}
function defaultBtns(){
  const list = [{label:'↻ Заново (R)', cls:'play', fn:restart}];
  if(curLevel >= 0) list.push({label:'☰ Уровни', fn:()=>setScreen('select')});
  else list.push({label:'✏ В редактор', fn:()=>setScreen('edit')});
  return list;
}
function hideMsg(){ msgEl.style.display='none'; }
function win(tumble){
  if(outcome==='win') return;
  outcome='win';
  const f = level.flag;
  for(let i=0;i<90;i++){
    confetti.push({x:f.cx*T+T/2, y:(f.cy-0.5)*T,
      vx:(Math.random()-0.5)*9, vy:-Math.random()*8-2,
      c:['#ff7a45','#6bbf59','#ffd23f','#4aa3df','#e05780'][i%5],
      r:Math.random()*6.28, life:70+Math.random()*50});
  }
  const btns = [];
  if(curLevel >= 0){
    progress[curLevel] = true; saveProgress();
    if(curLevel + 1 < LEVELS.length)
      btns.push({label:'▶ Следующий', cls:'play', fn:()=>startLevel(curLevel+1)});
    btns.push({label:'↻ Заново', fn:restart});
    btns.push({label:'☰ Уровни', fn:()=>setScreen('select')});
  } else {
    btns.push({label:'↻ Заново', cls:'play', fn:restart});
    btns.push({label:'✏ В редактор', fn:()=>setScreen('edit')});
  }
  showMsg(tumble? 'Финиш кувырком! 🤸🏁' : 'Победа! 🏁',
          tumble? 'Засчитано! Хотя было больно.' : 'Ты допрыгал до флага!', btns);
}
function restart(){ hideMsg(); spawnPlayer(); centerCam(); }

function setScreen(s){
  uiScreen = s;
  hideMsg();
  menuEl.style.display    = s==='menu'   ? 'flex' : 'none';
  selectEl.style.display  = s==='select' ? 'flex' : 'none';

}
function centerCam(){ if(player){ cam.x = player.x - W/2; cam.y = player.y - H*0.55; } }

function startLevel(i){
  curLevel = i;
  level = buildLevel(LEVELS[i]);
  hudName.textContent = (i+1)+'. '+LEVELS[i].name;

}
async function loadProgress(){
  try{
    if(window.storage){
      const r = await window.storage.get('pogo:progress');
      if(r && r.value) progress = JSON.parse(r.value);
    }
  }catch(e){}

/* сохранение */
function serialize(){ const L = editorLevel; return JSON.stringify({blocks:[...L.blocks], start:L.start, flag:L.flag}); }
function deserialize(s){
  const o = JSON.parse(s);
  editorLevel = { blocks:new Set(o.blocks), start:o.start, flag:o.flag };
  if(uiScreen==='edit') level = editorLevel;
}
document.getElementById('bSave').onclick = async ()=>{
  try{
    if(window.storage){ await window.storage.set('pogo:level', serialize()); hintEl.textContent='💾 Уровень сохранён!'; }
    else throw 0;
  }catch(e){
    localMem = serialize(); hintEl.textContent='💾 Сохранено (в памяти этой вкладки).';
  }
};
let localMem = null;
document.getElementById('bLoad').onclick = async ()=>{
  try{
    if(window.storage){
      const r = await window.storage.get('pogo:level');
      if(r && r.value){ deserialize(r.value); hintEl.textContent='📂 Уровень загружен!'; return; }
    }
    throw 0;
  }catch(e){
    if(localMem){ deserialize(localMem); hintEl.textContent='📂 Загружено из памяти.'; }
    else hintEl.textContent='Сохранённого уровня пока нет.';
  }
};
document.getElementById('bClear').onclick = ()=>{
  if(confirm('Очистить весь уровень?')){ editorLevel = { blocks:new Set(), start:{...editorLevel.start}, flag:{...editorLevel.flag} }; level = editorLevel; }
};

/* ============ редактор: мышь ============ */
let dragging = false, panning = false, lastMx=0, lastMy=0, eraseDrag=false;
let hover = null;
cv.addEventListener('contextmenu', e=>e.preventDefault());
cv.addEventListener('pointerdown', e=>{
  if(uiScreen!=='edit') return;
  lastMx = e.clientX; lastMy = e.clientY;
  if(e.button===2 || tool==='pan' || keys['Space']){ panning = true; return; }
  dragging = true;
  applyTool(e.clientX, e.clientY, false);
});
cv.addEventListener('pointermove', e=>{
  hover = {x:e.clientX, y:e.clientY};
  if(uiScreen!=='edit') return;
  if(panning){
    cam.x -= e.clientX - lastMx; cam.y -= e.clientY - lastMy;
    lastMx = e.clientX; lastMy = e.clientY; return;
  }
  if(dragging) applyTool(e.clientX, e.clientY, true);
});
window.addEventListener('pointerup', ()=>{ dragging=false; panning=false; });
cv.addEventListener('wheel', e=>{
  if(uiScreen!=='edit') return;
  cam.x += e.deltaX; cam.y += e.deltaY; e.preventDefault();
},{passive:false});

function applyTool(mx,my,drag){
  const wx = mx + cam.x, wy = my + cam.y;
  const cX = Math.floor(wx/T), cY = Math.floor(wy/T);
  if(tool==='block'){
    if(!(cX===level.flag.cx&&cY===level.flag.cy) && !(cX===level.start.cx&&cY===level.start.cy))
      level.blocks.add(key(cX,cY));
  }
  else if(tool==='erase') level.blocks.delete(key(cX,cY));
  else if(tool==='start' && !drag && !solidCell(cX,cY)) level.start = {cx:cX, cy:cY};
  else if(tool==='flag'  && !drag && !solidCell(cX,cY)) level.flag  = {cx:cX, cy:cY};
}

/* ============ отрисовка ============ */
function draw(){
  // небо
  const g = cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#9fd9ef'); g.addColorStop(1,'#eef7dc');
  cx.fillStyle = g; cx.fillRect(0,0,W,H);

  // облака (параллакс)
  cx.fillStyle = 'rgba(255,255,255,.85)';
  for(let i=0;i<8;i++){
    const ox = ((i*467 - cam.x*0.35) % (W+300) + W+300) % (W+300) - 150;
    const oy = 60 + (i*97)%220 - cam.y*0.12;
    cloud(ox, oy, 1 + (i%3)*0.35);
  }

  let sx=0, sy=0;
  if(shake>0.3){ sx=(Math.random()-0.5)*shake; sy=(Math.random()-0.5)*shake; shake*=0.86; }
  cx.save();
  cx.translate(-cam.x + sx, -cam.y + sy);

  // блоки видимой области
  const c0x = Math.floor(cam.x/T)-1, c1x = Math.floor((cam.x+W)/T)+1;
  const c0y = Math.floor(cam.y/T)-1, c1y = Math.floor((cam.y+H)/T)+1;
  for(let gy=c0y; gy<=c1y; gy++){
    for(let gx=c0x; gx<=c1x; gx++){
      if(!solidCell(gx,gy)) continue;
      const x = gx*T, y = gy*T;
      cx.fillStyle = '#8a5a3c';
      cx.fillRect(x,y,T,T);
      cx.fillStyle = 'rgba(0,0,0,.10)';
      cx.fillRect(x+4,y+10,10,7); cx.fillRect(x+22,y+22,12,8);
      if(!solidCell(gx,gy-1)){
        cx.fillStyle = '#6bbf59'; cx.fillRect(x,y,T,10);
        cx.fillStyle = '#57a748';
        cx.fillRect(x+4,y+8,6,4); cx.fillRect(x+18,y+7,7,5); cx.fillRect(x+31,y+8,5,4);
      }
    }
  }

  drawFlag();
  drawStartMarker();

  if(uiScreen==='play'){
    if(ragdoll) drawRagdoll(); else if(player) drawRider();
    // конфетти
    for(const c of confetti){
      cx.save(); cx.translate(c.x,c.y); cx.rotate(c.r);
      cx.fillStyle = c.c; cx.fillRect(-3,-2,6,4); cx.restore();
    }
  } else if(uiScreen==='edit'){
    drawGrid(c0x,c1x,c0y,c1y);
    drawGhost();
  }
  cx.restore();
}

function cloud(x,y,s){
  cx.beginPath();
  cx.arc(x,y,18*s,0,7); cx.arc(x+22*s,y-8*s,14*s,0,7); cx.arc(x+42*s,y,16*s,0,7);
  cx.fill();
}

function drawGrid(c0x,c1x,c0y,c1y){
  cx.strokeStyle = 'rgba(35,48,67,.12)'; cx.lineWidth = 1;
  cx.beginPath();
  for(let gx=c0x; gx<=c1x; gx++){ cx.moveTo(gx*T, c0y*T); cx.lineTo(gx*T, c1y*T); }
  for(let gy=c0y; gy<=c1y; gy++){ cx.moveTo(c0x*T, gy*T); cx.lineTo(c1x*T, gy*T); }
  cx.stroke();
}
function drawGhost(){
  if(!hover) return;
  const gx = Math.floor((hover.x+cam.x)/T), gy = Math.floor((hover.y+cam.y)/T);
  cx.fillStyle = tool==='erase' ? 'rgba(224,87,128,.35)' : 'rgba(35,48,67,.18)';
  cx.fillRect(gx*T, gy*T, T, T);
  cx.strokeStyle = 'rgba(35,48,67,.6)'; cx.lineWidth = 2;
  cx.strokeRect(gx*T+1, gy*T+1, T-2, T-2);
}
function drawStartMarker(){
  const s = level.start;
  const x = s.cx*T+T/2, y = (s.cy+1)*T;
  cx.fillStyle = 'rgba(107,191,89,.9)';
  cx.beginPath(); cx.moveTo(x-13,y-4); cx.lineTo(x+13,y-4); cx.lineTo(x,y-18); cx.closePath(); cx.fill();
  cx.strokeStyle = '#233043'; cx.lineWidth=2; cx.stroke();
}
function drawFlag(){
  const f = level.flag;
  const x = f.cx*T + T/2 - 8, base = (f.cy+1)*T;
  cx.strokeStyle = '#233043'; cx.lineWidth = 4; cx.lineCap='round';
  cx.beginPath(); cx.moveTo(x, base); cx.lineTo(x, base-66); cx.stroke();
  const fy = base-66;
  for(let i=0;i<4;i++) for(let j=0;j<2;j++){
    cx.fillStyle = (i+j)%2? '#233043':'#fdf8ee';
    cx.fillRect(x+ i*9, fy + j*9, 9, 9);
  }
  cx.strokeStyle = '#233043'; cx.lineWidth=2;
  cx.strokeRect(x, fy, 36, 18);
}

/* рисуем ездока */
function drawRider(){
  const p = player;
  const ux = Math.sin(p.a), uy = -Math.cos(p.a);
  const fx = Math.cos(p.a), fy = Math.sin(p.a);
  const P = (dx,dy)=>[p.x+ux*dy+fx*dx, p.y+uy*dy+fy*dx];
  const sq = p.squash;
  const tip = P(0,-STICK + sq*6);

  // палка + пружина
  cx.strokeStyle = '#ff7a45'; cx.lineWidth = 5; cx.lineCap = 'round';
  line(P(0,0), tip);
  cx.strokeStyle = '#233043'; cx.lineWidth = 3;
  const s0 = P(0,-STICK*0.55), s1 = P(0,-STICK*0.82 + sq*5);
  zigzag(s0, s1, 5, 7);
  // руль и подножки
  cx.strokeStyle = '#233043'; cx.lineWidth = 5;
  line(P(-13,2), P(13,2));
  line(P(-10,-STICK*0.5), P(10,-STICK*0.5));

  // человечек (приседает при отскоке)
  const crouch = sq*8;
  const feetL = P(-7,-STICK*0.5+3), feetR = P(7,-STICK*0.5+3);
  const hip   = P(-4, 6 - crouch*0.4);
  const sho   = P(-1, 27 - crouch);
  const headC = P(1, 38 - crouch);
  const kneeL = P(-13,-STICK*0.5+13), kneeR = P(13,-STICK*0.5+13);
  const handL = P(-11,3), handR = P(11,3);
  cx.strokeStyle = '#233043'; cx.lineWidth = 4.5; cx.lineJoin='round';
  line(feetL,kneeL); line(kneeL,hip); line(feetR,kneeR); line(kneeR,hip);
  line(hip,sho);
  line(sho,handL); line(sho,handR);
  // голова с каской
  cx.fillStyle = '#f4c08b';
  cx.beginPath(); cx.arc(headC[0],headC[1],9,0,7); cx.fill();
  cx.strokeStyle='#233043'; cx.lineWidth=2.5; cx.stroke();
  cx.fillStyle = '#e05780';
  cx.beginPath(); cx.arc(headC[0],headC[1],9.5,Math.PI+p.a, 2*Math.PI+p.a); cx.fill();

  // прицел + индикатор заряда: стоя (целишься) или заряжая в воздухе
  if(p.grounded || p.charge > 0.01){
    const aimLen = 34 + p.charge*46;
    const ax = p.x + ux*aimLen, ay = p.y + uy*aimLen;
    // пунктирная стрелка направления прыжка
    cx.save();
    cx.setLineDash([6,5]);
    cx.strokeStyle = p.charge>0 ? 'rgba(255,122,69,.9)' : 'rgba(35,48,67,.35)';
    cx.lineWidth = 3;
    line([p.x+ux*20, p.y+uy*20], [ax, ay]);
    cx.restore();
    if(p.charge>0){
      // наконечник
      const wx=-uy, wy=ux;
      cx.fillStyle = 'rgba(255,122,69,.95)';
      cx.beginPath();
      cx.moveTo(ax+ux*8, ay+uy*8);
      cx.lineTo(ax+wx*5, ay+wy*5);
      cx.lineTo(ax-wx*5, ay-wy*5);
      cx.closePath(); cx.fill();
    }
    // полоска заряда над головой
    if(p.charge>0.01){
      const bw=44, bh=7, bx=headC[0]-bw/2, by=headC[1]-26;
      cx.fillStyle='rgba(35,48,67,.85)'; roundRect(bx-2,by-2,bw+4,bh+4,5); cx.fill();
      const t=p.charge;
      cx.fillStyle = t<0.5 ? '#6bbf59' : t<0.85 ? '#ffd23f' : '#e0483c';
      roundRect(bx,by,bw*t,bh,4); cx.fill();
    }
  }
}
function roundRect(x,y,w,h,r){
  cx.beginPath();
  cx.moveTo(x+r,y); cx.arcTo(x+w,y,x+w,y+h,r); cx.arcTo(x+w,y+h,x,y+h,r);
  cx.arcTo(x,y+h,x,y,r); cx.arcTo(x,y,x+w,y,r); cx.closePath();
}
function line(a,b){ cx.beginPath(); cx.moveTo(a[0],a[1]); cx.lineTo(b[0],b[1]); cx.stroke(); }
function zigzag(a,b,n,amp){
  const dx=b[0]-a[0], dy=b[1]-a[1];
  const len=Math.hypot(dx,dy)||1, px=-dy/len, py=dx/len;
  cx.beginPath(); cx.moveTo(a[0],a[1]);
  for(let i=1;i<n;i++){
    const t=i/n, s=(i%2? 1:-1);
    cx.lineTo(a[0]+dx*t+px*amp*s, a[1]+dy*t+py*amp*s);
  }
  cx.lineTo(b[0],b[1]); cx.stroke();
}

function drawRagdoll(){
  const r = ragdoll;
  // палка улетает
  cx.strokeStyle = '#ff7a45'; cx.lineWidth = 5; cx.lineCap='round';
  const s = r.stick[0];
  line([s.a.x,s.a.y],[s.b.x,s.b.y]);
  // тело
  cx.strokeStyle = '#233043'; cx.lineWidth = 4.5;
  for(const c of r.links){
    if(c.a===r.head||c.b===r.head) continue;
    line([c.a.x,c.a.y],[c.b.x,c.b.y]);
  }
  cx.fillStyle = '#f4c08b';
  cx.beginPath(); cx.arc(r.head.x, r.head.y, 9, 0, 7); cx.fill();
  cx.strokeStyle='#233043'; cx.lineWidth=2.5; cx.stroke();
  // крестики-глаза
  cx.lineWidth=1.6;
  const e=(ex,ey)=>{ line([r.head.x+ex-2,r.head.y+ey-2],[r.head.x+ex+2,r.head.y+ey+2]);
                     line([r.head.x+ex+2,r.head.y+ey-2],[r.head.x+ex-2,r.head.y+ey+2]); };
  e(-3,-1); e(3,-1);
}

/* ============ главный цикл ============ */
let last = performance.now(), acc = 0;
function frame(now){
  acc += Math.min(50, now-last); last = now;
  while(acc >= 1000/60){
    acc -= 1000/60;
    if(uiScreen==='play'){
      if(ragdoll) stepRagdoll();
      else if(player && !outcome) stepPlayer();
      // камера следует
      const tx = (ragdoll? ragdoll.head.x : player.x) - W/2;
      const ty = (ragdoll? ragdoll.head.y : player.y) - H*0.55;
      cam.x += (tx-cam.x)*0.09; cam.y += (ty-cam.y)*0.09;
      for(const c of confetti){
        c.x+=c.vx; c.y+=c.vy; c.vy+=0.25; c.vx*=0.99; c.r+=0.15; c.life--;
      }
      confetti = confetti.filter(c=>c.life>0);
    }
    else if(uiScreen==='menu' || uiScreen==='select'){
      cam.x += 0.35;                     // лёгкий дрейф фона в меню
    }
  }
  draw();
  requestAnimationFrame(frame);
}
/* ============ старт ============ */
(async ()=>{
  try{
    if(window.storage){
      const r = await window.storage.get('pogo:level');
      if(r && r.value) deserialize(r.value);      // подтягиваем сохранённый свой уровень
    }
  }catch(e){}
  await loadProgress();
})();
cam.x = -60; cam.y = 120;
setScreen('menu');
requestAnimationFrame(frame);
</script>
